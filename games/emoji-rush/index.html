<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏎️ Emoji Rush V0.2.0 - 速度失控</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.3);
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 100;
        }
        .hidden { display: none !important; }
        h1 { font-size: 48px; color: #fff; text-shadow: 0 0 20px #e94560; margin-bottom: 10px; }
        .emoji-title { font-size: 72px; margin-bottom: 20px; animation: shake 0.5s infinite; }
        @keyframes shake { 
            0%,100%{transform:translateX(0) rotate(0)} 
            25%{transform:translateX(-3px) rotate(-2deg)} 
            75%{transform:translateX(3px) rotate(2deg)} 
        }
        .btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.5);
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .instructions {
            color: #888;
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            line-height: 1.8;
        }
        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            z-index: 50;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .speedometer {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 50;
        }
        .speed-value {
            font-size: 48px;
            font-weight: bold;
            color: #fff;
            text-shadow: 0 0 20px #e94560;
        }
        .speed-label {
            font-size: 12px;
            color: #888;
        }
        .warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 36px;
            font-weight: bold;
            text-shadow: 0 0 20px #ff0000;
            opacity: 0;
            transition: opacity 0.2s;
            z-index: 60;
            pointer-events: none;
        }
        .warning.show { opacity: 1; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="score-display" id="scoreDisplay">0m</div>
    <div class="warning" id="warning">🔥 速度失控!</div>
    
    <div class="speedometer">
        <div class="speed-value" id="speedValue">100</div>
        <div class="speed-label">km/h</div>
    </div>
    
    <div class="ui-overlay" id="startScreen">
        <div class="emoji-title">🏎️</div>
        <h1>EMOJI RUSH</h1>
        <div style="color: #e94560; font-size: 18px; margin-bottom: 20px;">⚠️ 速度失控模式</div>
        <button class="btn" id="startBtn">开始狂飙</button>
        <div class="instructions">
            ⚠️ 刹车坏了！车速只会越来越快！<br>
            👈 点击/触摸左侧 = 左变道<br>
            👉 点击/触摸右侧 = 右变道<br>
            🚧 躲避障碍物，撑得越久速度越快<br>
            🔥 速度超过300km/h时画面会颤抖！
        </div>
    </div>
    
    <div class="ui-overlay hidden" id="gameOverScreen">
        <div class="emoji-title">💥</div>
        <h1>撞车了！</h1>
        <div style="color: #fff; font-size: 20px; margin-bottom: 5px;">行驶距离: <span id="finalScore">0</span>m</div>
        <div style="color: #e94560; font-size: 18px; margin-bottom: 5px;">最高速度: <span id="finalSpeed">0</span>km/h</div>
        <div style="color: #ffd700; font-size: 16px; margin-bottom: 30px;">最高分: <span id="highScore">0</span>m</div>
        <button class="btn" id="restartBtn">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GAME_WIDTH = 400;
        const GAME_HEIGHT = 700;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        
        let gameState = 'start';
        let score = 0;
        let highScore = localStorage.getItem('emojiRushHighScore') || 0;
        let speed = 100; // km/h
        let maxSpeed = 100;
        let shakeIntensity = 0;
        
        const player = {
            x: GAME_WIDTH / 2,
            y: GAME_HEIGHT - 120,
            lane: 1,
            targetX: GAME_WIDTH / 2,
            emoji: '🏎️'
        };
        
        const LANES = [100, 200, 300];
        
        let obstacles = [];
        const OBSTACLE_EMOJIS = ['🪨', '🛢️', '🚧', '🕳️', '🌲', '🚜', '🦌'];
        
        let particles = [];
        let roadLines = [];
        for (let i = 0; i < 10; i++) {
            roadLines.push({ y: i * 80 });
        }
        
        // 输入处理 - 左右半屏点击
        canvas.addEventListener('click', (e) => {
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (GAME_WIDTH / rect.width);
            
            if (x < GAME_WIDTH / 2) {
                if (player.lane > 0) player.lane--;
            } else {
                if (player.lane < 2) player.lane++;
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (GAME_WIDTH / rect.width);
            
            if (x < GAME_WIDTH / 2) {
                if (player.lane > 0) player.lane--;
            } else {
                if (player.lane < 2) player.lane++;
            }
        }, { passive: false });
        
        document.addEventListener('keydown', (e) => {
            if (gameState !== 'playing') return;
            if (e.key === 'ArrowLeft' && player.lane > 0) player.lane--;
            if (e.key === 'ArrowRight' && player.lane < 2) player.lane++;
        });
        
        function startGame() {
            gameState = 'playing';
            score = 0;
            speed = 100;
            maxSpeed = 100;
            shakeIntensity = 0;
            obstacles = [];
            particles = [];
            player.lane = 1;
            player.x = LANES[1];
            player.targetX = LANES[1];
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('warning').classList.remove('show');
            requestAnimationFrame(gameLoop);
        }
        
        function gameOver() {
            gameState = 'gameover';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('emojiRushHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('finalSpeed').textContent = Math.floor(maxSpeed);
            document.getElementById('highScore').textContent = Math.floor(highScore);
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        function spawnObstacle() {
            // 根据速度调整生成率
            const spawnRate = 0.015 + (speed - 100) * 0.00005;
            
            if (Math.random() < spawnRate) {
                const lane = Math.floor(Math.random() * 3);
                // 避免连续在同一车道生成
                const lastObs = obstacles[obstacles.length - 1];
                if (lastObs && lastObs.lane === lane && lastObs.y < 150) return;
                
                obstacles.push({
                    x: LANES[lane],
                    y: -50,
                    lane: lane,
                    emoji: OBSTACLE_EMOJIS[Math.floor(Math.random() * OBSTACLE_EMOJIS.length)],
                    size: 35,
                    passed: false
                });
            }
        }
        
        function createParticle(x, y, emoji, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 8,
                    vy: (Math.random() - 0.5) * 8 + speed * 0.01,
                    life: 1,
                    emoji: emoji
                });
            }
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            // 速度只会越来越快！
            speed += 0.1;
            if (speed > maxSpeed) maxSpeed = speed;
            
            // 更新速度显示
            document.getElementById('speedValue').textContent = Math.floor(speed);
            
            // 速度颜色变化
            const speedEl = document.getElementById('speedValue');
            if (speed < 200) speedEl.style.color = '#fff';
            else if (speed < 300) speedEl.style.color = '#ffaa00';
            else speedEl.style.color = '#ff0000';
            
            // 显示警告
            if (speed > 300) {
                document.getElementById('warning').classList.add('show');
                shakeIntensity = (speed - 300) * 0.02;
            } else {
                document.getElementById('warning').classList.remove('show');
                shakeIntensity = 0;
            }
            
            // 移动玩家
            player.targetX = LANES[player.lane];
            player.x += (player.targetX - player.x) * 0.3;
            
            // 更新分数
            score += speed * 0.01;
            document.getElementById('scoreDisplay').textContent = Math.floor(score) + 'm';
            
            // 更新道路线 - 根据速度
            const moveSpeed = speed * 0.1;
            roadLines.forEach(line => {
                line.y += moveSpeed;
                if (line.y > GAME_HEIGHT) line.y = -80;
            });
            
            // 生成障碍物
            spawnObstacle();
            
            // 更新障碍物
            obstacles = obstacles.filter(obs => {
                obs.y += moveSpeed;
                
                // 碰撞检测
                const dx = obs.x - player.x;
                const dy = obs.y - player.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 35) {
                    createParticle(player.x, player.y, '💥', 10);
                    gameOver();
                    return false;
                }
                
                return obs.y < GAME_HEIGHT + 50;
            });
            
            // 更新粒子
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;
                return p.life > 0;
            });
            
            // 尾气效果 - 速度越快尾气越多
            if (Math.random() < speed / 500) {
                createParticle(player.x, player.y + 30, '💨', 1);
            }
        }
        
        function draw() {
            ctx.save();
            
            // 屏幕颤抖效果
            if (shakeIntensity > 0) {
                const shakeX = (Math.random() - 0.5) * shakeIntensity;
                const shakeY = (Math.random() - 0.5) * shakeIntensity;
                ctx.translate(shakeX, shakeY);
            }
            
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // 绘制道路
            ctx.fillStyle = '#0d0d1a';
            ctx.fillRect(50, 0, 300, GAME_HEIGHT);
            
            // 绘制道路边线 - 根据速度变色
            const speedRatio = Math.min((speed - 100) / 300, 1);
            const r = Math.floor(233 + (255 - 233) * speedRatio);
            const g = Math.floor(69 * (1 - speedRatio));
            const b = Math.floor(96 * (1 - speedRatio));
            ctx.strokeStyle = `rgb(${r}, ${g}, ${b})`;
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(50, 0);
            ctx.lineTo(50, GAME_HEIGHT);
            ctx.moveTo(350, 0);
            ctx.lineTo(350, GAME_HEIGHT);
            ctx.stroke();
            
            // 绘制车道线
            ctx.strokeStyle = `rgba(255,255,255,${0.3 + speedRatio * 0.4})`;
            ctx.lineWidth = 2;
            ctx.setLineDash([30 - speedRatio * 15, 30 - speedRatio * 15]);
            [150, 250].forEach(x => {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, GAME_HEIGHT);
                ctx.stroke();
            });
            ctx.setLineDash([]);
            
            // 绘制道路线
            ctx.fillStyle = `rgba(255,255,255,${0.5 + speedRatio * 0.5})`;
            roadLines.forEach(line => {
                ctx.fillRect(148, line.y, 4, 40);
                ctx.fillRect(248, line.y, 4, 40);
            });
            
            // 绘制障碍物
            ctx.font = '35px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            obstacles.forEach(obs => {
                ctx.fillText(obs.emoji, obs.x, obs.y);
            });
            
            // 绘制玩家 - 速度越快车越倾斜
            ctx.save();
            ctx.translate(player.x, player.y);
            const tilt = (player.targetX - player.x) * 0.05;
            ctx.rotate(tilt);
            ctx.font = '50px sans-serif';
            ctx.fillText(player.emoji, 0, 0);
            ctx.restore();
            
            // 绘制粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.font = '20px sans-serif';
                ctx.fillText(p.emoji, p.x, p.y);
            });
            ctx.globalAlpha = 1;
            
            ctx.restore();
        }
        
        function gameLoop() {
            update();
            draw();
            if (gameState === 'playing') {
                requestAnimationFrame(gameLoop);
            }
        }
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        draw();
    </script>
</body>
</html>
