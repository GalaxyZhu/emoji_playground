<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏎️ Emoji Rush V0.1.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
            box-shadow: 0 0 50px rgba(233, 69, 96, 0.3);
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 100;
        }
        .hidden { display: none !important; }
        h1 { font-size: 48px; color: #fff; text-shadow: 0 0 20px #e94560; margin-bottom: 10px; }
        .emoji-title { font-size: 72px; margin-bottom: 20px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.1)} }
        .btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #e94560 0%, #ff6b6b 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(233, 69, 96, 0.5);
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .instructions {
            color: #888;
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            line-height: 1.8;
        }
        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            z-index: 50;
            text-shadow: 0 0 10px rgba(0,0,0,0.5);
        }
        .boost-bar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 20px;
            background: rgba(255,255,255,0.2);
            border-radius: 10px;
            overflow: hidden;
            z-index: 50;
        }
        .boost-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88 0%, #00ccff 100%);
            width: 0%;
            transition: width 0.1s;
        }
        .boost-label {
            position: absolute;
            bottom: 55px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ff88;
            font-size: 12px;
            z-index: 50;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="score-display" id="scoreDisplay">0m</div>
    <div class="boost-label">🔥 氮气 (长按屏幕/按住鼠标加速)</div>
    <div class="boost-bar"><div class="boost-fill" id="boostFill"></div></div>
    
    <div class="ui-overlay" id="startScreen">
        <div class="emoji-title">🏎️</div>
        <h1>EMOJI RUSH</h1>
        <button class="btn" id="startBtn">开始狂飙</button>
        <div class="instructions">
            🎮 按住屏幕/鼠标 = 加速冲刺<br>
            ⚡ 松开 = 积攒氮气<br>
            🚧 躲避路上的障碍物<br>
            看你能跑多远！
        </div>
    </div>
    
    <div class="ui-overlay hidden" id="gameOverScreen">
        <div class="emoji-title">💥</div>
        <h1>撞车了！</h1>
        <div style="color: #fff; font-size: 24px; margin-bottom: 10px;">行驶距离: <span id="finalScore">0</span>m</div>
        <div style="color: #ffd700; font-size: 18px; margin-bottom: 30px;">最高分: <span id="highScore">0</span>m</div>
        <button class="btn" id="restartBtn">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        // 设置画布大小
        const GAME_WIDTH = 400;
        const GAME_HEIGHT = 700;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        
        // 游戏状态
        let gameState = 'start';
        let score = 0;
        let highScore = localStorage.getItem('emojiRushHighScore') || 0;
        let speed = 5;
        let boostMeter = 0;
        let isAccelerating = false;
        
        // 玩家
        const player = {
            x: GAME_WIDTH / 2,
            y: GAME_HEIGHT - 120,
            width: 40,
            height: 60,
            emoji: '🏎️',
            lane: 1, // 0=left, 1=center, 2=right
            targetX: GAME_WIDTH / 2
        };
        
        // 车道配置
        const LANES = [100, 200, 300];
        const LANE_WIDTH = 100;
        
        // 障碍物
        let obstacles = [];
        const OBSTACLE_EMOJIS = ['🪨', '🛢️', '🚧', '🕳️', '🌲'];
        
        // 粒子效果
        let particles = [];
        
        // 道路线
        let roadLines = [];
        for (let i = 0; i < 10; i++) {
            roadLines.push({ y: i * 80 });
        }
        
        // 输入处理
        let touchStartX = 0;
        
        canvas.addEventListener('mousedown', () => { isAccelerating = true; });
        canvas.addEventListener('mouseup', () => { isAccelerating = false; });
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isAccelerating = true;
            touchStartX = e.touches[0].clientX;
        }, { passive: false });
        canvas.addEventListener('touchend', () => { isAccelerating = false; });
        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;
            if (Math.abs(diff) > 50) {
                if (diff > 0 && player.lane < 2) player.lane++;
                else if (diff < 0 && player.lane > 0) player.lane--;
                touchStartX = touchX;
            }
        }, { passive: false });
        
        // 键盘控制
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' && player.lane > 0) player.lane--;
            if (e.key === 'ArrowRight' && player.lane < 2) player.lane++;
            if (e.key === ' ' || e.key === 'ArrowUp') isAccelerating = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') isAccelerating = false;
        });
        
        function startGame() {
            gameState = 'playing';
            score = 0;
            speed = 5;
            boostMeter = 0;
            obstacles = [];
            particles = [];
            player.lane = 1;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            requestAnimationFrame(gameLoop);
        }
        
        function gameOver() {
            gameState = 'gameover';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('emojiRushHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('highScore').textContent = Math.floor(highScore);
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        function spawnObstacle() {
            if (Math.random() < 0.02 + score * 0.00001) {
                const lane = Math.floor(Math.random() * 3);
                obstacles.push({
                    x: LANES[lane],
                    y: -50,
                    lane: lane,
                    emoji: OBSTACLE_EMOJIS[Math.floor(Math.random() * OBSTACLE_EMOJIS.length)],
                    size: 35
                });
            }
        }
        
        function createParticle(x, y, emoji) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    life: 1,
                    emoji: emoji || '💨'
                });
            }
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            // 加速逻辑
            if (isAccelerating && boostMeter > 0) {
                speed = Math.min(speed + 0.1, 15);
                boostMeter -= 0.5;
                createParticle(player.x, player.y + 30, '🔥');
            } else {
                speed = Math.max(speed - 0.05, 5);
                boostMeter = Math.min(boostMeter + 0.1, 100);
            }
            
            // 更新氮气条
            document.getElementById('boostFill').style.width = boostMeter + '%';
            
            // 移动玩家到目标车道
            player.targetX = LANES[player.lane];
            player.x += (player.targetX - player.x) * 0.2;
            
            // 更新分数
            score += speed * 0.1;
            document.getElementById('scoreDisplay').textContent = Math.floor(score) + 'm';
            
            // 更新道路线
            roadLines.forEach(line => {
                line.y += speed;
                if (line.y > GAME_HEIGHT) line.y = -80;
            });
            
            // 生成障碍物
            spawnObstacle();
            
            // 更新障碍物
            obstacles = obstacles.filter(obs => {
                obs.y += speed;
                
                // 碰撞检测
                const dx = obs.x - player.x;
                const dy = obs.y - player.y;
                const dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 35) {
                    createParticle(player.x, player.y, '💥');
                    gameOver();
                    return false;
                }
                
                return obs.y < GAME_HEIGHT + 50;
            });
            
            // 更新粒子
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                return p.life > 0;
            });
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // 绘制道路
            ctx.fillStyle = '#0d0d1a';
            ctx.fillRect(50, 0, 300, GAME_HEIGHT);
            
            // 绘制道路边线
            ctx.strokeStyle = '#e94560';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(50, 0);
            ctx.lineTo(50, GAME_HEIGHT);
            ctx.moveTo(350, 0);
            ctx.lineTo(350, GAME_HEIGHT);
            ctx.stroke();
            
            // 绘制车道线
            ctx.strokeStyle = 'rgba(255,255,255,0.3)';
            ctx.lineWidth = 2;
            ctx.setLineDash([30, 30]);
            [150, 250].forEach(x => {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, GAME_HEIGHT);
                ctx.stroke();
            });
            ctx.setLineDash([]);
            
            // 绘制道路线
            ctx.fillStyle = 'rgba(255,255,255,0.5)';
            roadLines.forEach(line => {
                ctx.fillRect(148, line.y, 4, 40);
                ctx.fillRect(248, line.y, 4, 40);
            });
            
            // 绘制障碍物
            ctx.font = '35px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            obstacles.forEach(obs => {
                ctx.fillText(obs.emoji, obs.x, obs.y);
            });
            
            // 绘制玩家
            ctx.font = '50px sans-serif';
            ctx.fillText(player.emoji, player.x, player.y);
            
            // 绘制加速特效
            if (isAccelerating && boostMeter > 0) {
                ctx.font = '30px sans-serif';
                for (let i = 0; i < 3; i++) {
                    ctx.fillText('🔥', player.x, player.y + 40 + i * 20);
                }
            }
            
            // 绘制粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.font = '20px sans-serif';
                ctx.fillText(p.emoji, p.x, p.y);
            });
            ctx.globalAlpha = 1;
        }
        
        function gameLoop() {
            update();
            draw();
            if (gameState === 'playing') {
                requestAnimationFrame(gameLoop);
            }
        }
        
        // 初始化
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        // 初始绘制
        draw();
    </script>
</body>
</html>
