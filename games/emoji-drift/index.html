<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚗 Emoji Drift V0.1.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
            box-shadow: 0 0 50px rgba(0, 200, 255, 0.3);
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 100;
        }
        .hidden { display: none !important; }
        h1 { font-size: 48px; color: #fff; text-shadow: 0 0 20px #00c8ff; margin-bottom: 10px; }
        .emoji-title { font-size: 72px; margin-bottom: 20px; animation: drift 2s infinite; }
        @keyframes drift { 0%,100%{transform:translateX(0)} 50%{transform:translateX(10px)} }
        .btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #00c8ff 0%, #0077ff 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 200, 255, 0.5);
        }
        .btn:hover { transform: scale(1.05); }
        .instructions {
            color: #888;
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            line-height: 1.8;
        }
        .score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 20px;
            z-index: 50;
        }
        .combo-display {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffd700;
            font-size: 24px;
            z-index: 50;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="score-display" id="scoreDisplay">得分: 0</div>
    <div class="combo-display" id="comboDisplay">🔥 x1</div>
    
    <div class="ui-overlay" id="startScreen">
        <div class="emoji-title">🚗</div>
        <h1>EMOJI DRIFT</h1>
        <button class="btn" id="startBtn">开始跑酷</button>
        <div class="instructions"
            👈 点击/触摸左侧 = 左移<br>
            👉 点击/触摸右侧 = 右移<br>
            💎 收集金币加分<br>
            ⚡ 闪电 = 加速<br>
            🛡️ 护盾 = 无敌<br>
            躲开所有障碍物！
        </div>
    </div>
    
    <div class="ui-overlay hidden" id="gameOverScreen">
        <div class="emoji-title">💥</div>
        <h1>撞车了！</h1>
        <div style="color: #fff; font-size: 24px; margin-bottom: 10px;">得分: <span id="finalScore">0</span></div>
        <div style="color: #ffd700; font-size: 18px; margin-bottom: 30px;">最高分: <span id="highScore">0</span></div>
        <button class="btn" id="restartBtn">再来一局</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GAME_WIDTH = 360;
        const GAME_HEIGHT = 640;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        
        let gameState = 'start';
        let score = 0;
        let highScore = localStorage.getItem('emojiDriftHighScore') || 0;
        let speed = 3;
        let combo = 1;
        let invincible = false;
        let invincibleTime = 0;
        
        const LANES = [60, 180, 300];
        let player = {
            x: LANES[1],
            y: GAME_HEIGHT - 150,
            lane: 1,
            targetX: LANES[1],
            emoji: '🚗'
        };
        
        let obstacles = [];
        let items = [];
        let roadLines = [];
        for (let i = 0; i < 8; i++) {
            roadLines.push({ y: i * 100 });
        }
        
        let particles = [];
        
        // 输入处理
        canvas.addEventListener('click', (e) => {
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            
            if (x < GAME_WIDTH / 2) {
                if (player.lane > 0) player.lane--;
            } else {
                if (player.lane < 2) player.lane++;
            }
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = touch.clientX - rect.left;
            
            if (x < GAME_WIDTH / 2) {
                if (player.lane > 0) player.lane--;
            } else {
                if (player.lane < 2) player.lane++;
            }
        }, { passive: false });
        
        document.addEventListener('keydown', (e) => {
            if (gameState !== 'playing') return;
            if (e.key === 'ArrowLeft' && player.lane > 0) player.lane--;
            if (e.key === 'ArrowRight' && player.lane < 2) player.lane++;
        });
        
        function startGame() {
            gameState = 'playing';
            score = 0;
            speed = 3;
            combo = 1;
            invincible = false;
            obstacles = [];
            items = [];
            particles = [];
            player.lane = 1;
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            requestAnimationFrame(gameLoop);
        }
        
        function gameOver() {
            gameState = 'gameover';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('emojiDriftHighScore', highScore);
            }
            document.getElementById('finalScore').textContent = score;
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        function spawnObject() {
            const spawnRate = 0.02 + score * 0.00001;
            
            if (Math.random() < spawnRate) {
                const lane = Math.floor(Math.random() * 3);
                const type = Math.random();
                
                if (type < 0.7) {
                    // 障碍物
                    const obstacles = ['🚧', '🚙', '🚚', '🛻', '🦌'];
                    obstacles.push({
                        x: LANES[lane],
                        y: -50,
                        lane: lane,
                        type: 'obstacle',
                        emoji: obstacles[Math.floor(Math.random() * obstacles.length)],
                        size: 40
                    });
                } else if (type < 0.9) {
                    // 金币
                    items.push({
                        x: LANES[lane],
                        y: -50,
                        lane: lane,
                        type: 'coin',
                        emoji: '💎',
                        size: 30
                    });
                } else if (type < 0.95) {
                    // 加速
                    items.push({
                        x: LANES[lane],
                        y: -50,
                        lane: lane,
                        type: 'boost',
                        emoji: '⚡',
                        size: 35
                    });
                } else {
                    // 护盾
                    items.push({
                        x: LANES[lane],
                        y: -50,
                        lane: lane,
                        type: 'shield',
                        emoji: '🛡️',
                        size: 35
                    });
                }
            }
        }
        
        function createParticle(x, y, emoji) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: (Math.random() - 0.5) * 4,
                    life: 1,
                    emoji: emoji
                });
            }
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            // 移动玩家
            player.targetX = LANES[player.lane];
            player.x += (player.targetX - player.x) * 0.3;
            
            // 更新速度
            speed = Math.min(3 + score * 0.001, 10);
            
            // 更新道路线
            roadLines.forEach(line => {
                line.y += speed;
                if (line.y > GAME_HEIGHT) line.y = -100;
            });
            
            // 生成物体
            spawnObject();
            
            // 更新障碍物
            obstacles = obstacles.filter(obj => {
                obj.y += speed;
                
                // 碰撞检测
                if (!invincible && Math.abs(obj.y - player.y) < 40 && obj.lane === player.lane) {
                    createParticle(player.x, player.y, '💥');
                    gameOver();
                    return false;
                }
                
                return obj.y < GAME_HEIGHT + 50;
            });
            
            // 更新物品
            items = items.filter(item => {
                item.y += speed;
                
                // 收集检测
                if (Math.abs(item.y - player.y) < 40 && item.lane === player.lane) {
                    if (item.type === 'coin') {
                        score += 10 * combo;
                        createParticle(item.x, item.y, '✨');
                    } else if (item.type === 'boost') {
                        score += 50;
                        combo = Math.min(combo + 1, 5);
                        createParticle(item.x, item.y, '⚡');
                    } else if (item.type === 'shield') {
                        invincible = true;
                        invincibleTime = 300;
                        createParticle(item.x, item.y, '🛡️');
                    }
                    return false;
                }
                
                return item.y < GAME_HEIGHT + 50;
            });
            
            // 更新无敌时间
            if (invincible) {
                invincibleTime--;
                if (invincibleTime <= 0) invincible = false;
            }
            
            // 更新粒子
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.05;
                return p.life > 0;
            });
            
            // 更新UI
            document.getElementById('scoreDisplay').textContent = '得分: ' + score;
            document.getElementById('comboDisplay').textContent = '🔥 x' + combo;
        }
        
        function draw() {
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // 道路
            ctx.fillStyle = '#0d0d1a';
            ctx.fillRect(30, 0, 300, GAME_HEIGHT);
            
            // 车道线
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 20]);
            [120, 240].forEach(x => {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, GAME_HEIGHT);
                ctx.stroke();
            });
            ctx.setLineDash([]);
            
            // 道路线
            ctx.fillStyle = 'rgba(0,200,255,0.3)';
            roadLines.forEach(line => {
                ctx.fillRect(118, line.y, 4, 50);
                ctx.fillRect(238, line.y, 4, 50);
            });
            
            ctx.font = '40px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 障碍物
            obstacles.forEach(obj => {
                ctx.fillText(obj.emoji, obj.x, obj.y);
            });
            
            // 物品
            items.forEach(item => {
                ctx.fillText(item.emoji, item.x, item.y);
            });
            
            // 玩家
            ctx.save();
            if (invincible && Math.floor(Date.now() / 100) % 2 === 0) {
                ctx.globalAlpha = 0.5;
            }
            ctx.font = '50px sans-serif';
            ctx.fillText(player.emoji, player.x, player.y);
            ctx.restore();
            
            // 护盾特效
            if (invincible) {
                ctx.strokeStyle = '#00ff88';
                ctx.lineWidth = 3;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 35, 0, Math.PI * 2);
                ctx.stroke();
            }
            
            // 粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.font = '20px sans-serif';
                ctx.fillText(p.emoji, p.x, p.y);
            });
            ctx.globalAlpha = 1;
        }
        
        function gameLoop() {
            update();
            draw();
            if (gameState === 'playing') {
                requestAnimationFrame(gameLoop);
            }
        }
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        draw();
    </script>
</body>
</html>
