<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚗 Emoji Drift V0.3.0 - 节奏漂移</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            background: linear-gradient(180deg, #1a1a2e 0%, #0d0d1a 100%);
            box-shadow: 0 0 50px rgba(0, 200, 255, 0.3);
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 100;
        }
        .hidden { display: none !important; }
        h1 { font-size: 48px; color: #fff; text-shadow: 0 0 20px #00c8ff; margin-bottom: 10px; }
        .emoji-title { font-size: 72px; margin-bottom: 20px; animation: drift 2s infinite; }
        @keyframes drift { 0%,100%{transform:translateX(0)} 50%{transform:translateX(10px)} }
        .btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #00c8ff 0%, #0077ff 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 200, 255, 0.5);
            margin: 5px 0;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-home {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
            font-size: 18px;
            padding: 12px 30px;
        }
        .instructions {
            color: #888;
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            line-height: 1.8;
        }
        .score-display {
            position: absolute;
            top: 20px;
            left: 20px;
            color: #fff;
            font-size: 20px;
            z-index: 50;
        }
        .combo-display {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #ffd700;
            font-size: 28px;
            z-index: 50;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
        }
        .health-display {
            position: absolute;
            top: 60px;
            left: 20px;
            color: #ff4444;
            font-size: 24px;
            z-index: 50;
        }
        .judgment {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 48px;
            font-weight: bold;
            z-index: 60;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.1s, transform 0.3s;
        }
        .judgment.perfect { color: #00ff88; text-shadow: 0 0 20px #00ff88; }
        .judgment.good { color: #00ccff; text-shadow: 0 0 20px #00ccff; }
        .judgment.miss { color: #ff4444; text-shadow: 0 0 20px #ff4444; }
        .judgment.show { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
        
        /* 连击特效 */
        .combo-bonus {
            position: absolute;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 36px;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            z-index: 60;
            pointer-events: none;
            opacity: 0;
        }
        .combo-bonus.show {
            animation: comboBonusAnim 1s forwards;
        }
        @keyframes comboBonusAnim {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -80%) scale(1); }
        }
        
        /* 低血量警告 */
        .low-health-warning {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ff0000;
            font-size: 48px;
            font-weight: bold;
            text-shadow: 0 0 30px #ff0000;
            z-index: 55;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .low-health-warning.show { opacity: 1; animation: pulse 0.5s infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="score-display" id="scoreDisplay">得分: 0</div>
    <div class="combo-display" id="comboDisplay">🔥 x0</div>
    <div class="health-display" id="healthDisplay">❤️ x10</div>
    <div class="judgment" id="judgment">PERFECT!</div>
    <div class="combo-bonus" id="comboBonus">+❤️ 连击奖励!</div>
    <div class="low-health-warning" id="lowHealthWarning">⚠️ 血量危险!</div>
    
    <div class="ui-overlay" id="startScreen">
        <div class="emoji-title">🚗</div>
        <h1>EMOJI DRIFT</h1>
        <div style="color: #00c8ff; font-size: 18px; margin-bottom: 20px;">🎵 节奏漂移模式 V0.3.0</div>
        <button class="btn" id="startBtn">开始漂移</button>
        <div class="instructions">
            🎵 弯道会在道路上出现<br>
            🎯 当车进入弯道判定区时<br>
            👈 点击左侧 = 左漂移<br>
            👉 点击右侧 = 右漂移<br>
            💚 Perfect = 最高速 + 连击+1<br>
            💙 Good = 正常<br>
            ❌ Miss = 扣1血 + 连击重置<br>
            <span style="color: #00ff88;">🔥 每10连击恢复1点生命！</span>
        </div>
    </div>
    
    <div class="ui-overlay hidden" id="gameOverScreen">
        <div class="emoji-title">💥</div>
        <h1 id="gameOverTitle">撞墙了！</h1>
        <div style="color: #fff; font-size: 20px; margin-bottom: 5px;">得分: <span id="finalScore">0</span></div>
        <div style="color: #ffd700; font-size: 16px; margin-bottom: 5px;">最高连击: <span id="finalCombo">0</span></div>
        <div style="color: #ff4444; font-size: 16px; margin-bottom: 5px;">剩余生命: <span id="finalHealth">0</span></div>
        <div style="color: #00c8ff; font-size: 14px; margin-bottom: 30px;">最高分: <span id="highScore">0</span></div>
        <button class="btn" id="restartBtn">再来一局</button>
        <button class="btn btn-home" id="homeBtn" onclick="location.href='https://galaxyzhu.github.io/emoji_playground/'">🏠 回到首页</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GAME_WIDTH = 400;
        const GAME_HEIGHT = 700;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        
        // 游戏状态
        let gameState = 'start';
        let score = 0;
        let highScore = localStorage.getItem('emojiDriftHighScore') || 0;
        let combo = 0;
        let maxCombo = 0;
        let health = 10;
        const MAX_HEALTH = 10;
        let lastComboMilestone = 0; // 上次回血时的连击数
        let speed = 5;
        let baseSpeed = 5;
        
        // 玩家
        const LANES = [100, 200, 300];
        let player = {
            x: LANES[1],
            y: GAME_HEIGHT - 200,
            lane: 1,
            targetX: LANES[1],
            emoji: '🚗',
            drifting: false,
            driftDir: 0,
            driftAngle: 0
        };
        
        // 弯道系统
        let curves = [];
        let lastCurveY = -500;
        
        // 道路线
        let roadLines = [];
        for (let i = 0; i < 10; i++) {
            roadLines.push({ y: i * 80 });
        }
        
        // 粒子
        let particles = [];
        
        // 输入处理
        let driftInput = 0; // -1=左, 0=无, 1=右
        
        canvas.addEventListener('click', (e) => {
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (GAME_WIDTH / rect.width);
            
            if (x < GAME_WIDTH / 2) {
                driftInput = -1;
                player.drifting = true;
                player.driftDir = -1;
            } else {
                driftInput = 1;
                player.drifting = true;
                player.driftDir = 1;
            }
            
            // 检查弯道判定
            checkCurveJudgment();
            
            setTimeout(() => {
                driftInput = 0;
                player.drifting = false;
                player.driftAngle = 0;
            }, 200);
        });
        
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameState !== 'playing') return;
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const x = (touch.clientX - rect.left) * (GAME_WIDTH / rect.width);
            
            if (x < GAME_WIDTH / 2) {
                driftInput = -1;
                player.drifting = true;
                player.driftDir = -1;
            } else {
                driftInput = 1;
                player.drifting = true;
                player.driftDir = 1;
            }
            
            checkCurveJudgment();
            
            setTimeout(() => {
                driftInput = 0;
                player.drifting = false;
                player.driftAngle = 0;
            }, 200);
        }, { passive: false });
        
        document.addEventListener('keydown', (e) => {
            if (gameState !== 'playing') return;
            if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') {
                driftInput = -1;
                player.drifting = true;
                player.driftDir = -1;
                checkCurveJudgment();
                setTimeout(() => {
                    driftInput = 0;
                    player.drifting = false;
                    player.driftAngle = 0;
                }, 200);
            }
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') {
                driftInput = 1;
                player.drifting = true;
                player.driftDir = 1;
                checkCurveJudgment();
                setTimeout(() => {
                    driftInput = 0;
                    player.drifting = false;
                    player.driftAngle = 0;
                }, 200);
            }
        });
        
        function showJudgment(text, type) {
            const el = document.getElementById('judgment');
            el.textContent = text;
            el.className = 'judgment ' + type + ' show';
            setTimeout(() => el.classList.remove('show'), 300);
        }
        
        function showComboBonus() {
            const el = document.getElementById('comboBonus');
            el.classList.add('show');
            setTimeout(() => el.classList.remove('show'), 1000);
        }
        
        function updateHealthUI() {
            document.getElementById('healthDisplay').textContent = '❤️ x' + health;
            
            // 低血量警告
            const warning = document.getElementById('lowHealthWarning');
            if (health <= 3 && health > 0) {
                warning.classList.add('show');
            } else {
                warning.classList.remove('show');
            }
        }
        
        function updateComboUI() {
            document.getElementById('comboDisplay').textContent = '🔥 x' + combo;
            
            // 连击奖励：每10连击恢复1点生命
            const currentMilestone = Math.floor(combo / 10);
            if (currentMilestone > lastComboMilestone && health < MAX_HEALTH) {
                health = Math.min(health + 1, MAX_HEALTH);
                lastComboMilestone = currentMilestone;
                updateHealthUI();
                showComboBonus();
                createParticle(player.x, player.y - 50, '💖', 5);
            }
        }
        
        function takeDamage() {
            health--;
            updateHealthUI();
            
            // 屏幕闪烁红色
            const flash = document.createElement('div');
            flash.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,0,0,0.3);z-index:90;pointer-events:none;';
            document.body.appendChild(flash);
            setTimeout(() => flash.remove(), 100);
            
            if (health <= 0) {
                createParticle(player.x, player.y, '💥', 15);
                gameOver();
            }
        }
        
        function checkCurveJudgment() {
            // 找到最近的未判定弯道
            const curve = curves.find(c => !c.judged && c.y > 300 && c.y < 550);
            if (!curve) {
                // 没有弯道时漂移会扣血（乱按）
                showJudgment('MISS!', 'miss');
                combo = 0;
                lastComboMilestone = 0;
                updateComboUI();
                takeDamage();
                return;
            }
            
            curve.judged = true;
            
            // 判定距离
            const dist = Math.abs(curve.y - player.y);
            
            // 判定方向
            if (driftInput !== curve.direction) {
                // 方向错误
                showJudgment('MISS!', 'miss');
                combo = 0;
                lastComboMilestone = 0;
                updateComboUI();
                takeDamage();
                return;
            }
            
            if (dist < 30) {
                // Perfect
                showJudgment('PERFECT!', 'perfect');
                score += 100 * (1 + combo * 0.1);
                combo++;
                speed = Math.min(speed + 0.3, 15);
                createParticle(player.x, player.y, '✨', 8);
            } else if (dist < 80) {
                // Good
                showJudgment('GOOD!', 'good');
                score += 50 * (1 + combo * 0.05);
                combo++;
                speed = Math.min(speed + 0.1, 12);
                createParticle(player.x, player.y, '💙', 5);
            } else {
                // Miss
                showJudgment('MISS!', 'miss');
                combo = 0;
                lastComboMilestone = 0;
                updateComboUI();
                takeDamage();
                return;
            }
            
            if (combo > maxCombo) maxCombo = combo;
            updateComboUI();
        }
        
        function startGame() {
            gameState = 'playing';
            score = 0;
            combo = 0;
            maxCombo = 0;
            health = MAX_HEALTH;
            lastComboMilestone = 0;
            speed = baseSpeed;
            curves = [];
            particles = [];
            lastCurveY = -500;
            player.lane = 1;
            player.x = LANES[1];
            player.targetX = LANES[1];
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            updateComboUI();
            updateHealthUI();
            requestAnimationFrame(gameLoop);
        }
        
        function gameOver() {
            gameState = 'gameover';
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('emojiDriftHighScore', highScore);
            }
            
            // 判断游戏结束原因
            const title = health <= 0 ? '生命耗尽！' : '撞墙了！';
            document.getElementById('gameOverTitle').textContent = title;
            
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('finalCombo').textContent = maxCombo;
            document.getElementById('finalHealth').textContent = health;
            document.getElementById('highScore').textContent = Math.floor(highScore);
            document.getElementById('gameOverScreen').classList.remove('hidden');
        }
        
        function spawnCurve() {
            // 根据速度调整生成间隔
            const interval = Math.max(250, 500 - speed * 25);
            
            if (lastCurveY < -interval) {
                const direction = Math.random() < 0.5 ? -1 : 1;
                curves.push({
                    y: -100,
                    direction: direction,
                    judged: false,
                    passed: false
                });
                lastCurveY = 0;
            }
            lastCurveY -= speed;
        }
        
        function createParticle(x, y, emoji, count = 5) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: (Math.random() - 0.5) * 6 - 3,
                    life: 1,
                    emoji: emoji
                });
            }
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            // 漂移角度动画
            if (player.drifting) {
                player.driftAngle += (player.driftDir * 0.4 - player.driftAngle) * 0.3;
            } else {
                player.driftAngle *= 0.8;
            }
            
            // 更新道路线
            roadLines.forEach(line => {
                line.y += speed;
                if (line.y > GAME_HEIGHT) line.y = -80;
            });
            
            // 生成弯道
            spawnCurve();
            
            // 更新弯道
            curves = curves.filter(curve => {
                curve.y += speed;
                
                // 检查是否错过弯道
                if (!curve.judged && !curve.passed && curve.y > player.y + 50) {
                    curve.passed = true;
                    showJudgment('MISS!', 'miss');
                    combo = 0;
                    lastComboMilestone = 0;
                    updateComboUI();
                    takeDamage();
                }
                
                return curve.y < GAME_HEIGHT + 100;
            });
            
            // 更新粒子
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life -= 0.03;
                return p.life > 0;
            });
            
            // 更新UI
            document.getElementById('scoreDisplay').textContent = '得分: ' + Math.floor(score);
        }
        
        function draw() {
            // 清空画布
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // 绘制道路
            ctx.fillStyle = '#3d3d5c';
            ctx.fillRect(50, 0, 300, GAME_HEIGHT);
            
            // 绘制道路边线
            ctx.strokeStyle = '#00c8ff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(50, 0);
            ctx.lineTo(50, GAME_HEIGHT);
            ctx.moveTo(350, 0);
            ctx.lineTo(350, GAME_HEIGHT);
            ctx.stroke();
            
            // 绘制车道线
            ctx.strokeStyle = 'rgba(255,255,255,0.2)';
            ctx.lineWidth = 2;
            ctx.setLineDash([20, 20]);
            [150, 250].forEach(x => {
                ctx.beginPath();
                ctx.moveTo(x, 0);
                ctx.lineTo(x, GAME_HEIGHT);
                ctx.stroke();
            });
            ctx.setLineDash([]);
            
            // 绘制道路线
            ctx.fillStyle = 'rgba(0,200,255,0.3)';
            roadLines.forEach(line => {
                ctx.fillRect(148, line.y, 4, 50);
                ctx.fillRect(248, line.y, 4, 50);
            });
            
            ctx.font = '40px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 绘制弯道
            curves.forEach(curve => {
                if (curve.judged) return;
                
                const alpha = Math.min(1, (curve.y + 100) / 200);
                ctx.globalAlpha = alpha;
                
                // 绘制弯道指示
                if (curve.direction === -1) {
                    // 左弯
                    ctx.fillStyle = '#ffaa00';
                    ctx.beginPath();
                    ctx.moveTo(200, curve.y - 40);
                    ctx.lineTo(100, curve.y);
                    ctx.lineTo(200, curve.y + 40);
                    ctx.fill();
                    ctx.fillText('👈', 150, curve.y);
                } else {
                    // 右弯
                    ctx.fillStyle = '#ffaa00';
                    ctx.beginPath();
                    ctx.moveTo(200, curve.y - 40);
                    ctx.lineTo(300, curve.y);
                    ctx.lineTo(200, curve.y + 40);
                    ctx.fill();
                    ctx.fillText('👉', 250, curve.y);
                }
                
                // 判定区
                const dist = Math.abs(curve.y - player.y);
                if (dist < 80) {
                    ctx.strokeStyle = dist < 30 ? '#00ff88' : '#00ccff';
                    ctx.lineWidth = 3;
                    ctx.setLineDash([5, 5]);
                    ctx.beginPath();
                    ctx.arc(200, curve.y, 40, 0, Math.PI * 2);
                    ctx.stroke();
                    ctx.setLineDash([]);
                }
            });
            ctx.globalAlpha = 1;
            
            // 绘制玩家
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.driftAngle);
            ctx.font = '50px sans-serif';
            ctx.fillText(player.emoji, 0, 0);
            
            // 漂移特效
            if (player.drifting) {
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.beginPath();
                ctx.ellipse(-player.driftDir * 20, 20, 15, 8, 0, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();
            
            // 绘制粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.font = '24px sans-serif';
                ctx.fillText(p.emoji, p.x, p.y);
            });
            ctx.globalAlpha = 1;
        }
        
        function gameLoop() {
            update();
            draw();
            if (gameState === 'playing') {
                requestAnimationFrame(gameLoop);
            }
        }
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        draw();
    </script>
</body>
</html>
