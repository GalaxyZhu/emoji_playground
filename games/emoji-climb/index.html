<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🏂 Emoji Climb V0.2.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            background: linear-gradient(180deg, #1a3a2e 0%, #0d0d1a 100%);
            box-shadow: 0 0 50px rgba(0, 255, 100, 0.3);
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 100;
        }
        .hidden { display: none !important; }
        h1 { font-size: 48px; color: #fff; text-shadow: 0 0 20px #00ff64; margin-bottom: 10px; }
        .emoji-title { font-size: 72px; margin-bottom: 20px; animation: shake 0.5s infinite; }
        @keyframes shake { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
        .btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #00ff64 0%, #00aa44 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 255, 100, 0.5);
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .btn-home {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
            font-size: 18px;
            padding: 12px 30px;
            margin-top: 10px;
        }
        .instructions {
            color: #888;
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            line-height: 1.8;
        }
        .hud {
            position: absolute;
            top: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            pointer-events: none;
            z-index: 50;
        }
        .hud-item {
            color: #fff;
            font-size: 20px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
        }
        .combo-display {
            position: absolute;
            top: 60px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.5);
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 50;
        }
        .combo-display.active { opacity: 1; }
        .controls-hint {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            z-index: 50;
            text-align: center;
        }
        .trick-text {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff64;
            font-size: 32px;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 255, 100, 0.8);
            opacity: 0;
            pointer-events: none;
            z-index: 60;
        }
        @keyframes trickPopup {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
            20% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(1); }
        }
        .trick-text.show { animation: trickPopup 1s ease-out; }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="hud">
        <div class="hud-item" id="distanceDisplay">0m</div>
        <div class="hud-item" id="scoreDisplay">0</div>
    </div>
    <div class="combo-display" id="comboDisplay">🔥 x1</div>
    <div class="trick-text" id="trickText"></div>
    <div class="controls-hint" id="controlsHint">按住蓄力 → 松手跳跃 → 空中按住翻转</div>
    
    <div class="ui-overlay" id="startScreen">
        <div class="emoji-title">🏂</div>
        <h1>EMOJI CLIMB</h1>
        <button class="btn" id="startBtn">开始冒险</button>
        <button class="btn btn-home" id="homeBtn" onclick="location.href='../../index.html'" style="margin-top: 15px;">🏠 回到街机厅</button>
        <div class="instructions">
            🎿 按住蓄力 → 跳得更高<br>
            🔄 空中按住 = 后空翻<br>
            ✨ 完美落地 = 加速冲刺<br>
            🔥 连续特技 = 分数翻倍<br>
            像 Alto 一样流畅滑行！
        </div>
    </div>
    
    <div class="ui-overlay hidden" id="gameOverScreen">
        <div class="emoji-title" id="crashEmoji">💥</div>
        <h1 id="crashTitle">摔倒了！</h1>
        <div style="color: #fff; font-size: 24px; margin-bottom: 5px;">距离: <span id="finalDistance">0</span>m</div>
        <div style="color: #ffd700; font-size: 20px; margin-bottom: 5px;">得分: <span id="finalScore">0</span></div>
        <div style="color: #888; font-size: 14px; margin-bottom: 30px;">最高分: <span id="highScore">0</span>m</div>
        <button class="btn" id="restartBtn">再来一局</button>
        <button class="btn btn-home" onclick="location.href='../../index.html'">🏠 回到街机厅</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 400;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        
        // 游戏状态
        let gameState = 'start';
        let distance = 0;
        let score = 0;
        let highScore = localStorage.getItem('emojiClimbHighScore_v2') || 0;
        
        // 物理参数 - Alto风格：流畅、低重力感
        const GRAVITY = 0.4;
        const GROUND_FRICTION = 0.98;
        const AIR_RESISTANCE = 0.995;
        
        // 玩家 - 滑雪者风格
        let player = {
            x: 150,
            y: 200,
            vx: 5,  // 初始速度
            vy: 0,
            angle: 0,
            angularVelocity: 0,
            width: 40,
            height: 40,
            emoji: '🏂',
            onGround: false,
            // 跳跃相关
            isCharging: false,
            chargePower: 0,
            maxCharge: 20,
            // 翻转相关
            isFlipping: false,
            flipRotation: 0,
            totalRotation: 0,
            // 连击
            combo: 0,
            comboTimer: 0,
            lastTrick: null
        };
        
        // 地形系统
        let terrain = [];
        let terrainOffset = 0;
        const TERRAIN_SEGMENT_WIDTH = 20;
        
        // 地形类型
        const TERRAIN_TYPES = {
            NORMAL: 'normal',
            ICE: 'ice',      // 冰面 - 低摩擦
            RAMP: 'ramp',    // 跳台 - 自动起跳
            GAP: 'gap'       // 鸿沟 - 必须跳过
        };
        
        // 粒子系统
        let particles = [];
        
        // 背景层（视差滚动）
        let bgOffset = 0;
        
        // 输入处理
        let isPressed = false;
        
        canvas.addEventListener('mousedown', () => isPressed = true);
        canvas.addEventListener('mouseup', () => isPressed = false);
        canvas.addEventListener('touchstart', (e) => { e.preventDefault(); isPressed = true; }, { passive: false });
        canvas.addEventListener('touchend', (e) => { e.preventDefault(); isPressed = false; }, { passive: false });
        document.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.key === 'ArrowUp') isPressed = true; });
        document.addEventListener('keyup', (e) => { if (e.code === 'Space' || e.key === 'ArrowUp') isPressed = false; });
        
        // 生成地形 - 使用更平滑的算法
        function generateTerrain() {
            terrain = [];
            let x = 0;
            let y = GAME_HEIGHT - 80;
            let type = TERRAIN_TYPES.NORMAL;
            
            while (x < GAME_WIDTH * 3) {
                // 根据距离增加难度
                const difficulty = Math.min(distance / 5000, 1);
                
                // 随机选择地形类型
                const rand = Math.random();
                if (rand < 0.05 + difficulty * 0.1) {
                    type = TERRAIN_TYPES.ICE;
                } else if (rand < 0.08 + difficulty * 0.05) {
                    type = TERRAIN_TYPES.RAMP;
                } else if (rand < 0.10 + difficulty * 0.08) {
                    type = TERRAIN_TYPES.GAP;
                } else {
                    type = TERRAIN_TYPES.NORMAL;
                }
                
                // 生成地形段
                const segmentWidth = TERRAIN_SEGMENT_WIDTH + Math.random() * 30;
                
                if (type === TERRAIN_TYPES.GAP) {
                    // 鸿沟 - 不生成地面
                    terrain.push({
                        x: x,
                        y: y,
                        width: 60 + Math.random() * 40,
                        height: 0,
                        type: TERRAIN_TYPES.GAP
                    });
                    x += 60 + Math.random() * 40;
                } else if (type === TERRAIN_TYPES.RAMP) {
                    // 跳台 - 向上倾斜
                    const rampHeight = 40 + Math.random() * 30;
                    terrain.push({
                        x: x,
                        y: y,
                        width: segmentWidth,
                        height: rampHeight,
                        type: TERRAIN_TYPES.RAMP,
                        angle: -Math.PI / 6
                    });
                    y -= rampHeight * 0.3;
                    x += segmentWidth;
                } else {
                    // 普通或冰面 - 平滑起伏
                    const heightChange = (Math.random() - 0.5) * 40;
                    y = Math.max(GAME_HEIGHT - 150, Math.min(GAME_HEIGHT - 50, y + heightChange));
                    
                    terrain.push({
                        x: x,
                        y: y,
                        width: segmentWidth,
                        height: GAME_HEIGHT - y,
                        type: type
                    });
                    x += segmentWidth;
                }
            }
        }
        
        // 获取地面高度和类型
        function getGroundInfo(x) {
            const worldX = x + terrainOffset;
            
            for (let i = 0; i < terrain.length; i++) {
                const seg = terrain[i];
                if (worldX >= seg.x && worldX < seg.x + seg.width) {
                    if (seg.type === TERRAIN_TYPES.GAP) {
                        return { y: GAME_HEIGHT + 200, type: TERRAIN_TYPES.GAP, angle: 0 };
                    }
                    
                    // 计算角度
                    let angle = 0;
                    if (i < terrain.length - 1) {
                        const nextSeg = terrain[i + 1];
                        if (nextSeg.type !== TERRAIN_TYPES.GAP) {
                            angle = Math.atan2(nextSeg.y - seg.y, nextSeg.x - seg.x);
                        }
                    }
                    
                    // 跳台特殊角度
                    if (seg.type === TERRAIN_TYPES.RAMP) {
                        angle = seg.angle;
                    }
                    
                    return { y: seg.y, type: seg.type, angle: angle };
                }
            }
            
            return { y: GAME_HEIGHT - 80, type: TERRAIN_TYPES.NORMAL, angle: 0 };
        }
        
        // 创建粒子
        function createParticle(x, y, type, count = 1) {
            const colors = {
                snow: '#ffffff',
                ice: '#aaddff',
                dust: '#8b7355',
                spark: '#ffd700'
            };
            
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: -Math.random() * 3 - 1,
                    life: 1,
                    color: colors[type] || colors.snow,
                    size: Math.random() * 4 + 2
                });
            }
        }
        
        // 显示特技文字
        function showTrickText(text) {
            const el = document.getElementById('trickText');
            el.textContent = text;
            el.classList.remove('show');
            void el.offsetWidth; // 触发重绘
            el.classList.add('show');
        }
        
        // 开始游戏
        function startGame() {
            gameState = 'playing';
            distance = 0;
            score = 0;
            terrainOffset = 0;
            bgOffset = 0;
            particles = [];
            
            player = {
                x: 150,
                y: 200,
                vx: 5,
                vy: 0,
                angle: 0,
                angularVelocity: 0,
                width: 40,
                height: 40,
                emoji: '🏂',
                onGround: false,
                isCharging: false,
                chargePower: 0,
                maxCharge: 20,
                isFlipping: false,
                flipRotation: 0,
                totalRotation: 0,
                combo: 0,
                comboTimer: 0,
                lastTrick: null
            };
            
            generateTerrain();
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('controlsHint').style.display = 'block';
            document.getElementById('comboDisplay').classList.remove('active');
            
            requestAnimationFrame(gameLoop);
        }
        
        // 游戏结束
        function gameOver() {
            gameState = 'gameover';
            if (distance > highScore) {
                highScore = Math.floor(distance);
                localStorage.setItem('emojiClimbHighScore_v2', highScore);
            }
            
            document.getElementById('finalDistance').textContent = Math.floor(distance);
            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('highScore').textContent = highScore;
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('controlsHint').style.display = 'none';
        }
        
        // 更新物理
        function update() {
            if (gameState !== 'playing') return;
            
            const ground = getGroundInfo(player.x);
            
            // 地面检测
            const groundY = ground.y;
            const wasOnGround = player.onGround;
            player.onGround = player.y + player.height/2 >= groundY - 5 && player.vy >= 0;
            
            // 跳跃蓄力
            if (player.onGround) {
                if (isPressed && !player.isCharging) {
                    player.isCharging = true;
                    player.chargePower = 0;
                }
                
                if (player.isCharging) {
                    if (isPressed) {
                        player.chargePower = Math.min(player.chargePower + 0.5, player.maxCharge);
                        // 蓄力时减速
                        player.vx *= 0.95;
                    } else {
                        // 释放跳跃
                        const jumpForce = 8 + player.chargePower * 0.5;
                        player.vy = -jumpForce;
                        player.onGround = false;
                        player.isCharging = false;
                        player.chargePower = 0;
                        createParticle(player.x, player.y + 20, 'snow', 5);
                    }
                } else {
                    // 地面滑行物理
                    if (ground.type === TERRAIN_TYPES.ICE) {
                        player.vx *= 0.995; // 冰面摩擦力极小
                    } else {
                        player.vx *= GROUND_FRICTION;
                    }
                    
                    // 自动加速到基础速度
                    if (player.vx < 3) player.vx += 0.1;
                    
                    // 落地角度平滑
                    const targetAngle = ground.angle;
                    player.angle += (targetAngle - player.angle) * 0.1;
                    player.angularVelocity = 0;
                    
                    // 检查落地特技
                    if (!wasOnGround && player.totalRotation !== 0) {
                        const flips = Math.floor(Math.abs(player.totalRotation) / (Math.PI * 2));
                        const remainder = Math.abs(player.totalRotation) % (Math.PI * 2);
                        const isGoodLanding = remainder < 0.5 || remainder > Math.PI * 2 - 0.5;
                        
                        if (isGoodLanding && flips > 0) {
                            // 完美落地奖励
                            player.vx += flips * 2; // 加速
                            score += flips * 100 * (player.combo + 1);
                            player.combo = Math.min(player.combo + 1, 5);
                            player.comboTimer = 120;
                            showTrickText(flips >= 2 ? '🔥 完美 ' + flips + ' 连翻!' : '✨ 完美落地!');
                            createParticle(player.x, player.y, 'spark', 8);
                        } else if (!isGoodLanding) {
                            // 落地姿势不好，减速
                            player.vx *= 0.5;
                            player.combo = 0;
                            showTrickText('💥 糟糕');
                        }
                        
                        player.totalRotation = 0;
                    }
                }
                
                player.y = groundY - player.height/2;
                player.vy = 0;
            } else {
                // 空中物理
                player.vy += GRAVITY;
                player.vx *= AIR_RESISTANCE;
                
                // 空中翻转
                if (isPressed) {
                    player.angularVelocity += 0.15;
                    player.isFlipping = true;
                } else {
                    // 自动回正
                    player.angularVelocity += (0 - player.angle) * 0.02;
                }
                
                player.angle += player.angularVelocity;
                player.angularVelocity *= 0.98;
                player.totalRotation += player.angularVelocity;
            }
            
            // 应用速度
            player.x += player.vx;
            player.y += player.vy;
            
            // 连击计时器
            if (player.comboTimer > 0) {
                player.comboTimer--;
                if (player.comboTimer === 0) {
                    player.combo = 0;
                }
            }
            
            // 相机跟随
            if (player.x > GAME_WIDTH * 0.4) {
                const moveAmount = player.x - GAME_WIDTH * 0.4;
                terrainOffset += moveAmount;
                bgOffset += moveAmount * 0.3;
                player.x = GAME_WIDTH * 0.4;
                distance += moveAmount;
                
                // 生成新地形
                while (terrain.length > 0 && terrain[0].x + terrain[0].width < terrainOffset - 100) {
                    terrain.shift();
                }
                
                // 添加新地形段
                const lastSeg = terrain[terrain.length - 1];
                if (lastSeg) {
                    generateTerrainFrom(lastSeg.x + lastSeg.width, lastSeg.y);
                }
            }
            
            // 掉落检测
            if (player.y > GAME_HEIGHT + 100) {
                gameOver();
                return;
            }
            
            // 更新粒子
            particles = particles.filter(p => {
                p.x -= player.vx;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.1;
                p.life -= 0.02;
                return p.life > 0;
            });
            
            // 生成地面粒子
            if (player.onGround && Math.abs(player.vx) > 3) {
                const groundType = getGroundInfo(player.x).type;
                const particleType = groundType === TERRAIN_TYPES.ICE ? 'ice' : 'snow';
                if (Math.random() < 0.3) {
                    createParticle(player.x - 20, player.y + 20, particleType, 1);
                }
            }
            
            // 更新UI
            document.getElementById('distanceDisplay').textContent = Math.floor(distance) + 'm';
            document.getElementById('scoreDisplay').textContent = Math.floor(score);
            
            const comboEl = document.getElementById('comboDisplay');
            if (player.combo > 0) {
                comboEl.textContent = '🔥 x' + (player.combo + 1);
                comboEl.classList.add('active');
            } else {
                comboEl.classList.remove('active');
            }
            
            // 持续得分
            score += player.vx * 0.1;
        }
        
        // 从指定位置生成新地形
        function generateTerrainFrom(startX, startY) {
            let x = startX;
            let y = startY;
            
            while (x < terrainOffset + GAME_WIDTH * 2) {
                const difficulty = Math.min(distance / 5000, 1);
                const rand = Math.random();
                
                let type = TERRAIN_TYPES.NORMAL;
                if (rand < 0.05 + difficulty * 0.1) type = TERRAIN_TYPES.ICE;
                else if (rand < 0.08 + difficulty * 0.05) type = TERRAIN_TYPES.RAMP;
                else if (rand < 0.10 + difficulty * 0.08) type = TERRAIN_TYPES.GAP;
                
                const segmentWidth = TERRAIN_SEGMENT_WIDTH + Math.random() * 30;
                
                if (type === TERRAIN_TYPES.GAP) {
                    terrain.push({
                        x: x,
                        y: y,
                        width: 60 + Math.random() * 40,
                        height: 0,
                        type: TERRAIN_TYPES.GAP
                    });
                    x += 60 + Math.random() * 40;
                } else if (type === TERRAIN_TYPES.RAMP) {
                    const rampHeight = 40 + Math.random() * 30;
                    terrain.push({
                        x: x,
                        y: y,
                        width: segmentWidth,
                        height: rampHeight,
                        type: TERRAIN_TYPES.RAMP,
                        angle: -Math.PI / 6
                    });
                    y -= rampHeight * 0.3;
                    x += segmentWidth;
                } else {
                    const heightChange = (Math.random() - 0.5) * 40;
                    y = Math.max(GAME_HEIGHT - 150, Math.min(GAME_HEIGHT - 50, y + heightChange));
                    
                    terrain.push({
                        x: x,
                        y: y,
                        width: segmentWidth,
                        height: GAME_HEIGHT - y,
                        type: type
                    });
                    x += segmentWidth;
                }
            }
        }
        
        // 绘制
        function draw() {
            // 天空渐变 - 随距离变化色调
            const timeOfDay = (distance / 5000) % 1;
            const gradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            
            if (timeOfDay < 0.25) { // 清晨
                gradient.addColorStop(0, '#ff9a76');
                gradient.addColorStop(1, '#2d5a6e');
            } else if (timeOfDay < 0.5) { // 正午
                gradient.addColorStop(0, '#4a90d9');
                gradient.addColorStop(1, '#87ceeb');
            } else if (timeOfDay < 0.75) { // 黄昏
                gradient.addColorStop(0, '#ff6b4a');
                gradient.addColorStop(1, '#4a3a6e');
            } else { // 夜晚
                gradient.addColorStop(0, '#1a1a3e');
                gradient.addColorStop(1, '#3a3a6e');
            }
            
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // 绘制远山（视差）
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.beginPath();
            for (let i = 0; i < GAME_WIDTH + 100; i += 50) {
                const x = i - (bgOffset * 0.2) % 100;
                const height = 100 + Math.sin(i * 0.01) * 30;
                ctx.lineTo(x, GAME_HEIGHT - height);
            }
            ctx.lineTo(GAME_WIDTH, GAME_HEIGHT);
            ctx.lineTo(0, GAME_HEIGHT);
            ctx.fill();
            
            // 绘制地形
            for (let i = 0; i < terrain.length; i++) {
                const seg = terrain[i];
                const drawX = seg.x - terrainOffset;
                
                if (drawX + seg.width < -50 || drawX > GAME_WIDTH + 50) continue;
                
                if (seg.type === TERRAIN_TYPES.GAP) continue;
                
                // 地形颜色
                if (seg.type === TERRAIN_TYPES.ICE) {
                    ctx.fillStyle = '#aaddff';
                } else if (seg.type === TERRAIN_TYPES.RAMP) {
                    ctx.fillStyle = '#5d8a6e';
                } else {
                    ctx.fillStyle = '#2d5a3e';
                }
                
                // 绘制地形段
                ctx.beginPath();
                ctx.moveTo(drawX, GAME_HEIGHT);
                
                // 找到下一个非鸿沟段
                let nextSeg = null;
                for (let j = i + 1; j < terrain.length; j++) {
                    if (terrain[j].type !== TERRAIN_TYPES.GAP) {
                        nextSeg = terrain[j];
                        break;
                    }
                }
                
                if (nextSeg) {
                    const nextDrawX = nextSeg.x - terrainOffset;
                    ctx.lineTo(drawX, seg.y);
                    ctx.lineTo(nextDrawX, nextSeg.y);
                    ctx.lineTo(nextDrawX, GAME_HEIGHT);
                } else {
                    ctx.lineTo(drawX, seg.y);
                    ctx.lineTo(drawX + seg.width, seg.y);
                    ctx.lineTo(drawX + seg.width, GAME_HEIGHT);
                }
                
                ctx.fill();
                
                // 地形顶部高光
                ctx.strokeStyle = seg.type === TERRAIN_TYPES.ICE ? '#ffffff' : '#4d8a5e';
                ctx.lineWidth = 2;
                ctx.beginPath();
                ctx.moveTo(drawX, seg.y);
                if (nextSeg) {
                    ctx.lineTo(nextSeg.x - terrainOffset, nextSeg.y);
                } else {
                    ctx.lineTo(drawX + seg.width, seg.y);
                }
                ctx.stroke();
            }
            
            // 绘制玩家
            ctx.save();
            ctx.translate(player.x, player.y);
            
            // 蓄力指示器
            if (player.isCharging) {
                const chargePercent = player.chargePower / player.maxCharge;
                ctx.strokeStyle = `hsl(${120 * chargePercent}, 100%, 50%)`;
                ctx.lineWidth = 4;
                ctx.beginPath();
                ctx.arc(0, -30, 20, -Math.PI/2, -Math.PI/2 + Math.PI * 2 * chargePercent);
                ctx.stroke();
            }
            
            ctx.rotate(player.angle);
            
            // 玩家emoji
            ctx.font = '40px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(player.emoji, 0, 0);
            
            ctx.restore();
            
            // 绘制粒子
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
            });
            ctx.globalAlpha = 1;
        }
        
        function gameLoop() {
            update();
            draw();
            if (gameState === 'playing') {
                requestAnimationFrame(gameLoop);
            }
        }
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        // 初始绘制
        generateTerrain();
        draw();
    </script>
</body>
</html>
