<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🚜 Emoji Climb V0.1.0</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: #0d0d1a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            overflow: hidden;
        }
        #gameCanvas {
            background: linear-gradient(180deg, #1a3a2e 0%, #0d0d1a 100%);
            box-shadow: 0 0 50px rgba(0, 255, 100, 0.3);
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.9);
            z-index: 100;
        }
        .hidden { display: none !important; }
        h1 { font-size: 48px; color: #fff; text-shadow: 0 0 20px #00ff64; margin-bottom: 10px; }
        .emoji-title { font-size: 72px; margin-bottom: 20px; animation: shake 0.5s infinite; }
        @keyframes shake { 0%,100%{transform:rotate(-5deg)} 50%{transform:rotate(5deg)} }
        .btn {
            padding: 15px 40px;
            font-size: 24px;
            background: linear-gradient(135deg, #00ff64 0%, #00aa44 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px rgba(0, 255, 100, 0.5);
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .btn-home {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.5);
            font-size: 18px;
            padding: 12px 30px;
            margin-top: 10px;
        }
        .instructions {
            color: #888;
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            line-height: 1.8;
        }
        .distance-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            z-index: 50;
        }
        .fuel-display {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd700;
            font-size: 16px;
            z-index: 50;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.5);
            font-size: 12px;
            z-index: 50;
        }
    </style>
    
    <!-- Vercel Web Analytics -->
    <script>
        window.va = window.va || function () { (window.vaq = window.vaq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <div class="distance-display" id="distanceDisplay">0m</div>
    <div class="fuel-display" id="fuelDisplay">⛽ 100%</div>
    <div class="controls-hint" id="controlsHint">按住 = 油门 | 松开 = 刹车</div>
    
    <div class="ui-overlay" id="startScreen">
        <div class="emoji-title">🚜</div>
        <h1>EMOJI CLIMB</h1>
        <button class="btn" id="startBtn">开始爬坡</button>
        <div class="instructions"
            🔴 按住屏幕/鼠标 = 油门加速<br>
            ⚫ 松开 = 刹车减速<br>
            ⚖️ 保持平衡，别翻车！<br>
            ⛽ 收集油桶补充燃料<br>
            💰 金币加分<br>
            看你能爬多远！
        </div>
    </div>
    
    <div class="ui-overlay hidden" id="gameOverScreen">
        <div class="emoji-title" id="crashEmoji">💥</div>
        <h1 id="crashTitle">翻车了！</h1>
        <div style="color: #fff; font-size: 24px; margin-bottom: 10px;">行驶距离: <span id="finalDistance">0</span>m</div>
        <div style="color: #ffd700; font-size: 18px; margin-bottom: 10px;">最高分: <span id="highScore">0</span>m</div>
        <div style="color: #888; font-size: 14px; margin-bottom: 30px;"><span id="crashReason"></span></div>
        <button class="btn" id="restartBtn">再来一局</button>
        <button class="btn btn-home" onclick="location.href='../../index.html'">🏠 回到街机厅</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        
        const GAME_WIDTH = 800;
        const GAME_HEIGHT = 400;
        canvas.width = GAME_WIDTH;
        canvas.height = GAME_HEIGHT;
        
        let gameState = 'start';
        let distance = 0;
        let highScore = localStorage.getItem('emojiClimbHighScore') || 0;
        let fuel = 100;
        
        // 物理参数
        let gravity = 0.5;
        let groundY = GAME_HEIGHT - 50;
        
        // 玩家车辆
        let player = {
            x: 100,
            y: groundY - 40,
            vx: 0,
            vy: 0,
            angle: 0,
            angularVelocity: 0,
            width: 60,
            height: 40,
            emoji: '🚜',
            wheelRadius: 15,
            onGround: false
        };
        
        // 地形
        let terrain = [];
        let terrainOffset = 0;
        
        // 物品
        let items = [];
        
        // 粒子
        let particles = [];
        
        // 输入
        let isAccelerating = false;
        
        // 生成地形
        function generateTerrain() {
            terrain = [];
            for (let x = 0; x < GAME_WIDTH + 200; x += 10) {
                const height = Math.sin(x * 0.01) * 30 + Math.sin(x * 0.03) * 15;
                terrain.push({
                    x: x,
                    y: groundY - height
                });
            }
        }
        
        generateTerrain();
        
        // 输入处理
        canvas.addEventListener('mousedown', () => isAccelerating = true);
        canvas.addEventListener('mouseup', () => isAccelerating = false);
        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            isAccelerating = true;
        }, { passive: false });
        canvas.addEventListener('touchend', (e) => {
            e.preventDefault();
            isAccelerating = false;
        }, { passive: false });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') isAccelerating = true;
        });
        document.addEventListener('keyup', (e) => {
            if (e.key === ' ' || e.key === 'ArrowUp') isAccelerating = false;
        });
        
        function startGame() {
            gameState = 'playing';
            distance = 0;
            fuel = 100;
            terrainOffset = 0;
            items = [];
            particles = [];
            
            player = {
                x: 100,
                y: groundY - 40,
                vx: 0,
                vy: 0,
                angle: 0,
                angularVelocity: 0,
                width: 60,
                height: 40,
                emoji: '🚜',
                wheelRadius: 15,
                onGround: false
            };
            
            generateTerrain();
            
            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('controlsHint').style.display = 'block';
            requestAnimationFrame(gameLoop);
        }
        
        function gameOver(reason) {
            gameState = 'gameover';
            if (distance > highScore) {
                highScore = distance;
                localStorage.setItem('emojiClimbHighScore', highScore);
            }
            
            const crashEmoji = document.getElementById('crashEmoji');
            const crashTitle = document.getElementById('crashTitle');
            
            if (reason === 'fuel') {
                crashEmoji.textContent = '⛽';
                crashTitle.textContent = '没油了！';
            } else if (Math.abs(player.angle) > Math.PI / 2) {
                crashEmoji.textContent = '🙃';
                crashTitle.textContent = '翻车了！';
            } else {
                crashEmoji.textContent = '💥';
                crashTitle.textContent = '撞毁了！';
            }
            
            document.getElementById('finalDistance').textContent = Math.floor(distance);
            document.getElementById('highScore').textContent = Math.floor(highScore);
            document.getElementById('crashReason').textContent = reason || '车辆损毁';
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('controlsHint').style.display = 'none';
        }
        
        function getGroundY(x) {
            const index = Math.floor((x + terrainOffset) / 10) % terrain.length;
            if (index >= 0 && index < terrain.length) {
                return terrain[index].y;
            }
            return groundY;
        }
        
        function getGroundAngle(x) {
            const index = Math.floor((x + terrainOffset) / 10) % terrain.length;
            const nextIndex = (index + 1) % terrain.length;
            if (index >= 0 && index < terrain.length && nextIndex < terrain.length) {
                const dx = 10;
                const dy = terrain[nextIndex].y - terrain[index].y;
                return Math.atan2(dy, dx);
            }
            return 0;
        }
        
        function spawnItem() {
            if (Math.random() < 0.01) {
                const type = Math.random() < 0.3 ? 'fuel' : 'coin';
                items.push({
                    x: GAME_WIDTH + 50,
                    y: getGroundY(GAME_WIDTH) - 60 - Math.random() * 50,
                    type: type,
                    emoji: type === 'fuel' ? '⛽' : '💰',
                    size: 30
                });
            }
        }
        
        function createParticle(x, y, emoji, count = 3) {
            for (let i = 0; i < count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5 - 2,
                    life: 1,
                    emoji: emoji
                });
            }
        }
        
        function update() {
            if (gameState !== 'playing') return;
            
            // 燃料消耗
            if (isAccelerating) {
                fuel -= 0.1;
                if (fuel <= 0) {
                    gameOver('fuel');
                    return;
                }
            }
            
            // 车辆物理
            const groundAngle = getGroundAngle(player.x);
            
            // 加速度和刹车
            if (isAccelerating) {
                player.vx += Math.cos(groundAngle) * 0.3;
                player.vy += Math.sin(groundAngle) * 0.3;
            } else {
                // 刹车/摩擦
                player.vx *= 0.98;
                player.vy *= 0.98;
            }
            
            // 重力
            player.vy += gravity;
            
            // 空气阻力
            player.vx *= 0.999;
            
            // 更新位置
            player.x += player.vx;
            player.y += player.vy;
            
            // 地面碰撞
            const groundAtPlayer = getGroundY(player.x);
            if (player.y + player.height / 2 >= groundAtPlayer - 10) {
                player.y = groundAtPlayer - player.height / 2 - 10;
                player.vy = 0;
                player.onGround = true;
                
                // 根据地面角度调整车辆角度
                const targetAngle = groundAngle * 0.1;
                player.angularVelocity += (targetAngle - player.angle) * 0.05;
            } else {
                player.onGround = false;
                // 空中旋转
                player.angularVelocity += (player.vx * 0.01 - player.angle * 0.02);
            }
            
            // 角度物理
            player.angle += player.angularVelocity;
            player.angularVelocity *= 0.95;
            
            // 翻车检测
            if (Math.abs(player.angle) > Math.PI / 2 && player.onGround) {
                gameOver('flip');
                return;
            }
            
            // 相机跟随
            if (player.x > GAME_WIDTH * 0.6) {
                const moveAmount = player.x - GAME_WIDTH * 0.6;
                terrainOffset += moveAmount;
                player.x = GAME_WIDTH * 0.6;
                distance += moveAmount;
                
                // 生成新地形
                if (terrainOffset > 100) {
                    terrain.shift();
                    const lastX = terrain[terrain.length - 1].x;
                    const height = Math.sin((lastX + terrainOffset) * 0.01) * 30 + 
                                   Math.sin((lastX + terrainOffset) * 0.03) * 15 +
                                   Math.random() * 20 - 10;
                    terrain.push({
                        x: lastX + 10,
                        y: groundY - height
                    });
                    terrainOffset -= 10;
                }
            }
            
            // 掉落检测
            if (player.y > GAME_HEIGHT + 100) {
                gameOver('fall');
                return;
            }
            
            // 生成物品
            spawnItem();
            
            // 更新物品
            items = items.filter(item => {
                item.x -= player.vx;
                
                // 碰撞检测
                const dx = item.x - player.x;
                const dy = item.y - player.y;
                if (Math.sqrt(dx*dx + dy*dy) < 40) {
                    if (item.type === 'fuel') {
                        fuel = Math.min(fuel + 30, 100);
                        createParticle(item.x, item.y, '⛽', 5);
                    } else {
                        createParticle(item.x, item.y, '💰', 5);
                    }
                    return false;
                }
                
                return item.x > -50;
            });
            
            // 更新粒子
            particles = particles.filter(p => {
                p.x -= player.vx;
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2; // 重力
                p.life -= 0.02;
                return p.life > 0;
            });
            
            // 尾气效果
            if (isAccelerating && fuel > 0) {
                createParticle(player.x - 30, player.y, '💨', 1);
            }
            
            // 更新UI
            document.getElementById('distanceDisplay').textContent = Math.floor(distance) + 'm';
            document.getElementById('fuelDisplay').textContent = '⛽ ' + Math.floor(fuel) + '%';
            document.getElementById('fuelDisplay').style.color = fuel < 30 ? '#ff4444' : '#ffd700';
        }
        
        function draw() {
            ctx.fillStyle = '#1a3a2e';
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // 天空渐变
            const gradient = ctx.createLinearGradient(0, 0, 0, GAME_HEIGHT);
            gradient.addColorStop(0, '#1a3a5e');
            gradient.addColorStop(1, '#1a3a2e');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, GAME_WIDTH, GAME_HEIGHT);
            
            // 绘制地形
            ctx.fillStyle = '#2d5a3e';
            ctx.beginPath();
            ctx.moveTo(0, GAME_HEIGHT);
            
            for (let i = 0; i < terrain.length; i++) {
                const point = terrain[i];
                const drawX = point.x - terrainOffset;
                if (drawX >= -10 && drawX <= GAME_WIDTH + 10) {
                    ctx.lineTo(drawX, point.y);
                }
            }
            
            ctx.lineTo(GAME_WIDTH, GAME_HEIGHT);
            ctx.lineTo(0, GAME_HEIGHT);
            ctx.fill();
            
            // 地形顶部线条
            ctx.strokeStyle = '#4d8a5e';
            ctx.lineWidth = 3;
            ctx.beginPath();
            for (let i = 0; i < terrain.length; i++) {
                const point = terrain[i];
                const drawX = point.x - terrainOffset;
                if (drawX >= -10 && drawX <= GAME_WIDTH + 10) {
                    if (i === 0) ctx.moveTo(drawX, point.y);
                    else ctx.lineTo(drawX, point.y);
                }
            }
            ctx.stroke();
            
            ctx.font = '30px sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            
            // 物品
            items.forEach(item => {
                const drawX = item.x - terrainOffset;
                if (drawX > -50 && drawX < GAME_WIDTH + 50) {
                    ctx.fillText(item.emoji, drawX, item.y);
                }
            });
            
            // 绘制车辆
            ctx.save();
            ctx.translate(player.x, player.y);
            ctx.rotate(player.angle);
            
            // 车身
            ctx.font = '50px sans-serif';
            ctx.fillText(player.emoji, 0, 0);
            
            // 燃料低警告
            if (fuel < 20 && Math.floor(Date.now() / 200) % 2 === 0) {
                ctx.fillText('⚠️', 0, -40);
            }
            
            ctx.restore();
            
            // 粒子
            particles.forEach(p => {
                const drawX = p.x - terrainOffset;
                if (drawX > -50 && drawX < GAME_WIDTH + 50) {
                    ctx.globalAlpha = p.life;
                    ctx.font = '20px sans-serif';
                    ctx.fillText(p.emoji, drawX, p.y);
                }
            });
            ctx.globalAlpha = 1;
            
            // 控制提示
            if (gameState === 'playing') {
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(GAME_WIDTH / 2 - 100, GAME_HEIGHT - 80, 200, 40);
                ctx.fillStyle = isAccelerating ? '#00ff64' : '#fff';
                ctx.font = '16px sans-serif';
                ctx.fillText(isAccelerating ? '🔥 加速中' : '⚫ 刹车', GAME_WIDTH / 2, GAME_HEIGHT - 60);
            }
        }
        
        function gameLoop() {
            update();
            draw();
            if (gameState === 'playing') {
                requestAnimationFrame(gameLoop);
            }
        }
        
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        
        draw();
    </script>
</body>
</html>
