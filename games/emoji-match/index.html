<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🧩 Emoji Match - 记忆翻牌</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f23 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #fff;
            overflow: hidden;
        }
        
        /* 头部 */
        .header {
            width: 100%;
            padding: 10px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            background: rgba(0, 0, 0, 0.3);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .game-title {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(135deg, #00f5ff, #bc13fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        /* 玩家状态栏 */
        .players-bar {
            display: flex;
            gap: 20px;
            margin: 15px 0;
            padding: 10px 20px;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
        }
        
        .player {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
            opacity: 0.5;
        }
        
        .player.active {
            opacity: 1;
            background: rgba(0, 245, 255, 0.15);
            box-shadow: 0 0 20px rgba(0, 245, 255, 0.3);
        }
        
        .player-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .player-1 .player-avatar { background: linear-gradient(135deg, #ff006e, #ff4d9e); }
        .player-2 .player-avatar { background: linear-gradient(135deg, #00f5ff, #00ccff); }
        
        .player-info {
            display: flex;
            flex-direction: column;
        }
        
        .player-name {
            font-size: 13px;
            color: #888;
        }
        
        .player-score {
            font-size: 20px;
            font-weight: 700;
        }
        
        /* 游戏信息 */
        .game-info {
            display: flex;
            gap: 30px;
            margin-bottom: 15px;
            font-size: 14px;
            color: #888;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .info-value {
            color: #fff;
            font-weight: 600;
        }
        
        /* 难度选择 */
        .difficulty-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        
        .diff-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }
        
        .diff-btn:hover, .diff-btn.active {
            background: linear-gradient(135deg, #bc13fe, #ff006e);
            border-color: transparent;
        }
        
        /* 游戏区域 */
        .game-board {
            display: grid;
            gap: 8px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            margin-bottom: 15px;
            width: 100%;
            max-width: min(90vw, 500px);
        }
        
        .game-board.easy { grid-template-columns: repeat(4, 1fr); }
        .game-board.medium { grid-template-columns: repeat(6, 1fr); }
        .game-board.hard { grid-template-columns: repeat(8, 1fr); }
        
        /* 卡片 */
        .card {
            width: 100%;
            aspect-ratio: 1;
            position: relative;
            cursor: pointer;
            transform-style: preserve-3d;
            transition: transform 0.4s ease;
            min-height: 50px;
        }
        
        .card.flipped {
            transform: rotateY(180deg);
        }
        
        .card.matched {
            animation: matchAnimation 0.5s ease forwards;
        }
        
        @keyframes matchAnimation {
            0% { transform: rotateY(180deg) scale(1); opacity: 1; }
            50% { transform: rotateY(180deg) scale(1.1); opacity: 0.8; }
            100% { transform: rotateY(180deg) scale(0); opacity: 0; }
        }
        
        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: min(8vw, 40px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
        
        .card-front {
            background: linear-gradient(135deg, #2a2a4e 0%, #1a1a3e 100%);
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        
        .card-front::after {
            content: '?';
            font-size: 24px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 700;
        }
        
        .card-back {
            background: linear-gradient(135deg, #ff006e 0%, #bc13fe 100%);
            border: 2px solid rgba(255, 255, 255, 0.2);
            transform: rotateY(180deg);
        }
        
        /* 控制按钮 */
        .controls {
            display: flex;
            gap: 15px;
        }
        
        .btn {
            padding: 12px 30px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00f5ff, #00ccff);
            color: #000;
        }
        
        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 245, 255, 0.4);
        }

        .btn-home {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            padding: 12px 30px;
        }

        .btn-home:hover {
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        /* 游戏结束弹窗 */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        
        .modal.show {
            opacity: 1;
            pointer-events: auto;
        }
        
        .modal-content {
            background: linear-gradient(135deg, #1a1a3e 0%, #0f0f23 100%);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            max-width: 90%;
            width: 400px;
        }
        
        .modal-title {
            font-size: 28px;
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ff006e, #00f5ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .winner-display {
            font-size: 60px;
            margin: 20px 0;
        }
        
        .final-scores {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin: 20px 0;
        }
        
        .final-score {
            text-align: center;
        }
        
        .final-score-value {
            font-size: 36px;
            font-weight: 700;
        }
        
        .final-score-label {
            font-size: 14px;
            color: #888;
        }
        
        /* 响应式 */
        @media (max-width: 600px) {
            .game-board.easy { gap: 6px; }
            .game-board.medium { gap: 5px; }
            .game-board.hard { gap: 4px; }
            
            .card-face {
                font-size: min(7vw, 30px);
            }
            
            .players-bar {
                gap: 10px;
                padding: 8px 12px;
            }
            
            .player {
                padding: 6px 10px;
            }
            
            .player-avatar {
                width: 30px;
                height: 30px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <!-- 头部 -->
    <div class="header">
        <div class="game-title">🧩 Emoji Match</div>
    </div>
    
    <!-- 玩家状态 -->
    <div class="players-bar">
        <div class="player player-1 active" id="player1">
            <div class="player-avatar">🎮</div>
            <div class="player-info">
                <div class="player-name" data-i18n="player1">玩家 1</div>
                <div class="player-score" id="score1">0</div>
            </div>
        </div>
        <div class="player player-2" id="player2">
            <div class="player-avatar">🎯</div>
            <div class="player-info">
                <div class="player-name" data-i18n="player2">玩家 2</div>
                <div class="player-score" id="score2">0</div>
            </div>
        </div>
    </div>
    
    <!-- 难度选择 -->
    <div class="difficulty-selector">
        <button class="diff-btn active" data-size="4" onclick="setDifficulty(4)"><span data-i18n="easy">简单</span> 4×4</button>
        <button class="diff-btn" data-size="6" onclick="setDifficulty(6)"><span data-i18n="medium">中等</span> 6×6</button>
        <button class="diff-btn" data-size="8" onclick="setDifficulty(8)"><span data-i18n="hard">困难</span> 8×8</button>
    </div>
    
    <!-- 游戏信息 -->
    <div class="game-info">
        <div class="info-item">
            <span>🔄 <span data-i18n="turn">回合</span>:</span>
            <span class="info-value" id="turnCount">0</span>
        </div>
        <div class="info-item">
            <span>⏱️ <span data-i18n="time">时间</span>:</span>
            <span class="info-value" id="timer">00:00</span>
        </div>
    </div>
    
    <!-- 游戏板 -->
    <div class="game-board easy" id="gameBoard"></div>
    
    <!-- 控制按钮 -->
    <div class="controls">
        <button class="btn btn-primary" onclick="newGame()"><span data-i18n="newGame">🎮 开始游戏</span></button>
        <button class="btn btn-secondary" onclick="resetGame()"><span data-i18n="reset">🔄 重置</span></button>
        <button class="btn btn-home" onclick="location.href='../../index.html'"><span data-i18n="backToArcade">🏠 回到街机厅</span></button>
    </div>
    
    <!-- 游戏结束弹窗 -->
    <div class="modal" id="gameOverModal">
        <div class="modal-content">
            <div class="modal-title" data-i18n="gameOver">🎉 游戏结束!</div>
            <div class="winner-display" id="winnerEmoji">🏆</div>
            <div id="winnerText" data-i18n="player1Wins">玩家 1 获胜!</div>
            
            <div class="final-scores">
                <div class="final-score">
                    <div class="final-score-value" id="finalScore1">0</div>
                    <div class="final-score-label" data-i18n="player1">玩家 1</div>
                </div>
                <div class="final-score">
                    <div class="final-score-value" id="finalScore2">0</div>
                    <div class="final-score-label" data-i18n="player2">玩家 2</div>
                </div>
            </div>
            
            <button class="btn btn-primary" onclick="closeModal(); newGame();" data-i18n="playAgain">再玩一局</button>
            <button class="btn btn-home" onclick="location.href='../../index.html'" data-i18n="backToArcade">🏠 回到街机厅</button>
        </div>
    </div>

    <script>
        // ==================== 国际化配置 ====================
        const i18n = {
            zh: {
                player1: '玩家 1',
                player2: '玩家 2',
                easy: '简单',
                medium: '中等',
                hard: '困难',
                turn: '回合',
                time: '时间',
                score: '得分',
                highScore: '最高分',
                newGame: '🎮 开始游戏',
                reset: '🔄 重置',
                backToArcade: '🏠 回到街机厅',
                gameOver: '🎉 游戏结束!',
                player1Wins: '🎮 玩家 1 获胜!',
                player2Wins: '🎯 玩家 2 获胜!',
                draw: '🤝 平局!',
                playAgain: '再玩一局'
            },
            en: {
                player1: 'Player 1',
                player2: 'Player 2',
                easy: 'Easy',
                medium: 'Medium',
                hard: 'Hard',
                turn: 'Turn',
                time: 'Time',
                score: 'Score',
                highScore: 'High Score',
                newGame: '🎮 Start Game',
                reset: '🔄 Reset',
                backToArcade: '🏠 Back to Arcade',
                gameOver: '🎉 Game Over!',
                player1Wins: '🎮 Player 1 Wins!',
                player2Wins: '🎯 Player 2 Wins!',
                draw: '🤝 Draw!',
                playAgain: 'Play Again'
            }
        };

        // 检测语言
        const userLang = navigator.language || navigator.userLanguage;
        const lang = userLang && userLang.startsWith('en') ? 'en' : 'zh';

        // 应用翻译
        function applyI18n() {
            const texts = i18n[lang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (texts[key]) {
                    el.textContent = texts[key];
                }
            });
            // 更新html lang属性
            document.documentElement.lang = lang === 'en' ? 'en-US' : 'zh-CN';
        }

        // ==================== 游戏配置 ====================
        const EMOJIS = [
            '🐶', '🐱', '🐭', '🐹', '🐰', '🦊', '🐻', '🐼',
            '🐨', '🐯', '🦁', '🐮', '🐷', '🐸', '🐵', '🐔',
            '🐧', '🐦', '🐤', '🦆', '🦅', '🦉', '🦇', '🐺',
            '🐗', '🐴', '🦄', '🐝', '🐛', '🦋', '🐌', '🐞',
            '🐜', '🦟', '🦗', '🕷️', '🕸️', '🦂', '🐢', '🐍',
            '🦎', '🦖', '🦕', '🐙', '🦑', '🦐', '🦞', '🦀',
            '🐡', '🐠', '🐟', '🐬', '🐳', '🐋', '🦈', '🐊',
            '🐅', '🐆', '🦓', '🦍', '🦧', '🐘', '🦛', '🦏'
        ];
        
        // ==================== 游戏状态 ====================
        let gameState = {
            gridSize: 4,
            cards: [],
            flippedCards: [],
            matchedPairs: 0,
            currentPlayer: 1,
            scores: { 1: 0, 2: 0 },
            turnCount: 0,
            isProcessing: false,
            gameStarted: false,
            timerInterval: null,
            seconds: 0
        };
        
        // ==================== 初始化 ====================
        function init() {
            applyI18n();
            newGame();
        }
        
        function setDifficulty(size) {
            gameState.gridSize = size;
            
            // 更新按钮状态
            document.querySelectorAll('.diff-btn').forEach(btn => {
                btn.classList.remove('active');
                if (parseInt(btn.dataset.size) === size) {
                    btn.classList.add('active');
                }
            });
            
            // 更新游戏板样式
            const board = document.getElementById('gameBoard');
            board.className = 'game-board';
            if (size === 4) board.classList.add('easy');
            else if (size === 6) board.classList.add('medium');
            else board.classList.add('hard');
            
            newGame();
        }
        
        function newGame() {
            // 重置状态
            clearInterval(gameState.timerInterval);
            gameState = {
                gridSize: gameState.gridSize,
                cards: [],
                flippedCards: [],
                matchedPairs: 0,
                currentPlayer: 1,
                scores: { 1: 0, 2: 0 },
                turnCount: 0,
                isProcessing: false,
                gameStarted: true,
                timerInterval: null,
                seconds: 0
            };
            
            // 重置UI
            updateScores();
            document.getElementById('turnCount').textContent = '0';
            document.getElementById('timer').textContent = '00:00';
            updateActivePlayer();
            closeModal();
            
            // 生成卡片
            generateCards();
            
            // 开始计时
            gameState.timerInterval = setInterval(updateTimer, 1000);
        }
        
        function resetGame() {
            newGame();
        }
        
        function generateCards() {
            const board = document.getElementById('gameBoard');
            board.innerHTML = '';
            
            const totalCards = gameState.gridSize * gameState.gridSize;
            const pairsNeeded = totalCards / 2;
            
            // 选择随机emoji
            const selectedEmojis = EMOJIS.slice(0, pairsNeeded);
            
            // 创建卡片数组（每个emoji两张）
            const cardValues = [...selectedEmojis, ...selectedEmojis];
            
            // 洗牌（Fisher-Yates算法）
            for (let i = cardValues.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [cardValues[i], cardValues[j]] = [cardValues[j], cardValues[i]];
            }
            
            // 创建卡片DOM
            gameState.cards = cardValues.map((emoji, index) => {
                const card = document.createElement('div');
                card.className = 'card';
                card.dataset.index = index;
                card.dataset.emoji = emoji;
                card.innerHTML = `
                    <div class="card-face card-front"></div>
                    <div class="card-face card-back">${emoji}</div>
                `;
                card.addEventListener('click', () => flipCard(index));
                board.appendChild(card);
                
                return {
                    element: card,
                    emoji: emoji,
                    flipped: false,
                    matched: false
                };
            });
        }
        
        function flipCard(index) {
            const card = gameState.cards[index];
            
            // 检查是否可以翻转
            if (gameState.isProcessing || 
                card.flipped || 
                card.matched || 
                gameState.flippedCards.length >= 2) {
                return;
            }
            
            // 翻转卡片
            card.flipped = true;
            card.element.classList.add('flipped');
            gameState.flippedCards.push(card);
            
            // 检查是否翻开了两张
            if (gameState.flippedCards.length === 2) {
                gameState.turnCount++;
                document.getElementById('turnCount').textContent = gameState.turnCount;
                checkMatch();
            }
        }
        
        function checkMatch() {
            gameState.isProcessing = true;
            const [card1, card2] = gameState.flippedCards;
            
            if (card1.emoji === card2.emoji) {
                // 配对成功
                setTimeout(() => {
                    card1.matched = true;
                    card2.matched = true;
                    card1.element.classList.add('matched');
                    card2.element.classList.add('matched');
                    
                    // 当前玩家得分
                    gameState.scores[gameState.currentPlayer]++;
                    updateScores();
                    
                    gameState.matchedPairs++;
                    gameState.flippedCards = [];
                    gameState.isProcessing = false;
                    
                    // 检查游戏结束
                    if (gameState.matchedPairs === (gameState.gridSize * gameState.gridSize) / 2) {
                        endGame();
                    }
                }, 500);
            } else {
                // 配对失败，切换玩家
                setTimeout(() => {
                    card1.flipped = false;
                    card2.flipped = false;
                    card1.element.classList.remove('flipped');
                    card2.element.classList.remove('flipped');
                    
                    gameState.flippedCards = [];
                    gameState.isProcessing = false;
                    
                    // 切换玩家
                    gameState.currentPlayer = gameState.currentPlayer === 1 ? 2 : 1;
                    updateActivePlayer();
                }, 1000);
            }
        }
        
        function updateScores() {
            document.getElementById('score1').textContent = gameState.scores[1];
            document.getElementById('score2').textContent = gameState.scores[2];
        }
        
        function updateActivePlayer() {
            document.getElementById('player1').classList.toggle('active', gameState.currentPlayer === 1);
            document.getElementById('player2').classList.toggle('active', gameState.currentPlayer === 2);
        }
        
        function updateTimer() {
            gameState.seconds++;
            const mins = Math.floor(gameState.seconds / 60).toString().padStart(2, '0');
            const secs = (gameState.seconds % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${mins}:${secs}`;
        }
        
        function endGame() {
            clearInterval(gameState.timerInterval);
            
            const score1 = gameState.scores[1];
            const score2 = gameState.scores[2];
            const texts = i18n[lang];
            
            document.getElementById('finalScore1').textContent = score1;
            document.getElementById('finalScore2').textContent = score2;
            
            const winnerText = document.getElementById('winnerText');
            const winnerEmoji = document.getElementById('winnerEmoji');
            
            if (score1 > score2) {
                winnerText.textContent = texts.player1Wins;
                winnerEmoji.textContent = '🏆';
            } else if (score2 > score1) {
                winnerText.textContent = texts.player2Wins;
                winnerEmoji.textContent = '🏆';
            } else {
                winnerText.textContent = texts.draw;
                winnerEmoji.textContent = '🤝';
            }
            
            document.getElementById('gameOverModal').classList.add('show');
            
            // 显示匹配游戏诊断报告
            setTimeout(() => {
                if (typeof MatchDiagnosis !== 'undefined') {
                    MatchDiagnosis.show({
                        score1: score1,
                        score2: score2,
                        isDraw: score1 === score2,
                        winner: score1 > score2 ? 1 : (score2 > score1 ? 2 : 0)
                    });
                }
            }, 1500);
        }
        
        function closeModal() {
            document.getElementById('gameOverModal').classList.remove('show');
        }
        
        // ==================== 启动 ====================
        
        // 检测是否在 iframe 中，如果是则隐藏返回按钮
        if (window.self !== window.top) {
            document.body.classList.add('in-iframe');
        }
        
        init();
    </script>
    
    <!-- 匹配游戏诊断系统 -->
    <script>
        const MatchDiagnosis = {
            types: {
                BRN: { icon: '🧠', title: '人脑计算机', titleEn: 'Human Computer', quote: '"三消？那是我的母语。"', rare: '稀有', rarePercent: '8%', rarityClass: 'rare', roasts: ['你的大脑是GPU做的吧', '建议去拉斯维加斯', '你玩匹配像在做高数题'] },
                COL: { icon: '🦥', title: '树懒型选手', titleEn: 'Sloth Gamer', quote: '"我找到了！……刚才那个。"', rare: '常见', rarePercent: '38%', rarityClass: 'common', roasts: ['反应速度让树懒都着急', '游戏结束三秒后才点', '建议玩回合制'] },
                OCD: { icon: '🔍', title: '强迫症患者', titleEn: 'Match OCD', quote: '"颜色不对，宁愿不消。"', rare: '常见', rarePercent: '24%', rarityClass: 'common', roasts: ['强迫症比分数还高', '太挑剔导致时间到了', '建议去整理衣柜'] },
                RNG: { icon: '🎰', title: '瞎点点大师', titleEn: 'Random Clicker', quote: '"只要点得够快，概率就追不上我。"', rare: '常见', rarePercent: '30%', rarityClass: 'common', roasts: ['手速和智商成反比', '鼠标：我承受了太多', '建议去玩刮刮乐'] }
            },
            detectType(stats) {
                if (stats.isDraw) return 'RNG';
                if (stats.score1 >= 8 || stats.score2 >= 8) return 'BRN';
                if (stats.score1 <= 2 && stats.score2 <= 2) return 'COL';
                return 'OCD';
            },
            show(stats) {
                const typeCode = this.detectType(stats);
                const type = this.types[typeCode];
                const roast = type.roasts[Math.floor(Math.random() * type.roasts.length)];
                const rarityColors = { common: 'linear-gradient(135deg,#94a3b8,#64748b)', rare: 'linear-gradient(135deg,#60a5fa,#3b82f6)', epic: 'linear-gradient(135deg,#a855f7,#7c3aed)', legendary: 'linear-gradient(135deg,#fbbf24,#f59e0b)' };
                const winnerText = stats.isDraw ? '平局！' : (stats.winner === 1 ? '玩家1获胜!' : '玩家2获胜!');
                const html = `
                    <div id="diagnosisModal" style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.92);z-index:99999;display:flex;justify-content:center;align-items:center;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;" onclick="if(event.target===this)MatchDiagnosis.hide()">
                        <div style="background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);border-radius:20px;padding:30px;max-width:420px;width:90%;border:2px solid rgba(255,255,255,0.1);position:relative;max-height:90vh;overflow-y:auto;">
                            <div style="position:absolute;top:15px;right:15px;width:50px;height:50px;border:2px solid #ef4444;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#ef4444;font-weight:bold;font-size:12px;transform:rotate(-15deg);opacity:0.8;">确诊</div>
                            <div style="text-align:center;margin-bottom:20px;">
                                <div style="font-size:50px;margin-bottom:10px;">${type.icon}</div>
                                <div style="background:rgba(255,255,255,0.1);padding:4px 12px;border-radius:15px;font-size:11px;color:#94a3b8;display:inline-block;margin-bottom:8px;">🧩 Emoji Match 诊断</div>
                                <h2 style="font-size:22px;font-weight:800;background:linear-gradient(90deg,#fbbf24,#ec4899);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:3px;">${type.title}</h2>
                                <div style="color:#64748b;font-size:13px;">${type.titleEn}</div>
                                <div style="display:inline-flex;align-items:center;gap:4px;margin-top:12px;padding:6px 16px;border-radius:20px;font-weight:700;font-size:12px;background:${rarityColors[type.rarityClass]};color:#fff;">🌟 ${type.rare} · ${type.rarePercent}</div>
                            </div>
                            <div style="background:rgba(99,102,241,0.1);border-left:3px solid #6366f1;padding:12px;margin:12px 0;border-radius:0 8px 8px 0;font-style:italic;color:#cbd5e1;font-size:13px;">${type.quote}</div>
                            <div style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);padding:10px;border-radius:8px;margin:12px 0;"><div style="color:#ef4444;font-size:11px;font-weight:600;margin-bottom:4px;">💬 专属吐槽</div><div style="color:#fca5a5;font-size:13px;">${roast}</div></div>
                            <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:15px 0;">
                                <div style="background:rgba(255,255,255,0.05);padding:12px;border-radius:8px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#3b82f6;">${stats.score1}</div><div style="font-size:11px;color:#94a3b8;">玩家1得分</div></div>
                                <div style="background:rgba(255,255,255,0.05);padding:12px;border-radius:8px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#ec4899;">${stats.score2}</div><div style="font-size:11px;color:#94a3b8;">玩家2得分</div></div>
                                <div style="background:rgba(255,255,255,0.05);padding:12px;border-radius:8px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#fbbf24;">${stats.isDraw ? '🤝' : '🏆'}</div><div style="font-size:11px;color:#94a3b8;">${winnerText}</div></div>
                                <div style="background:rgba(255,255,255,0.05);padding:12px;border-radius:8px;text-align:center;"><div style="font-size:18px;font-weight:800;color:#a855f7;">${stats.score1 + stats.score2}</div><div style="font-size:11px;color:#94a3b8;">总匹配数</div></div>
                            </div>
                            <div style="border-top:1px solid rgba(255,255,255,0.1);padding-top:15px;margin-top:15px;">
                                <div style="text-align:center;color:#94a3b8;font-size:11px;margin-bottom:10px;">分享你的诊断报告</div>
                                <div style="display:flex;gap:6px;justify-content:center;flex-wrap:wrap;">
                                    <button onclick="MatchDiagnosis.share('twitter')" style="padding:8px 14px;border-radius:15px;border:none;background:#1da1f2;color:white;font-weight:600;cursor:pointer;font-size:12px;">🐦</button>
                                    <button onclick="MatchDiagnosis.share('weibo')" style="padding:8px 14px;border-radius:15px;border:none;background:#e6162d;color:white;font-weight:600;cursor:pointer;font-size:12px;">📱</button>
                                    <button onclick="MatchDiagnosis.share('copy')" style="padding:8px 14px;border-radius:15px;border:none;background:rgba(255,255,255,0.1);color:white;border:1px solid rgba(255,255,255,0.2);font-weight:600;cursor:pointer;font-size:12px;">📋</button>
                                    <button onclick="MatchDiagnosis.hide()" style="padding:8px 14px;border-radius:15px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;font-weight:600;cursor:pointer;font-size:12px;">🔄 再玩</button>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                const existing = document.getElementById('diagnosisModal');
                if (existing) existing.remove();
                document.body.insertAdjacentHTML('beforeend', html);
                this.currentType = type;
            },
            hide() { const modal = document.getElementById('diagnosisModal'); if (modal) modal.remove(); closeModal(); init(); },
            share(platform) {
                const type = this.currentType;
                const text = `🎮 Emoji Arcade 诊断报告\n\n${type.icon} ${type.title}\n${type.quote}\n\n测测你是什么玩家"病症" 👉 emojiarcade.app`;
                if (platform === 'twitter') window.open(`https://twitter.com/intent/tweet?text=${encodeURIComponent('🎮 刚被诊断为「' + type.title + '」\n' + type.quote)}&url=${encodeURIComponent('https://emojiarcade.app')}`, '_blank');
                else if (platform === 'weibo') window.open(`https://service.weibo.com/share/share.php?title=${encodeURIComponent(text)}&url=${encodeURIComponent('https://emojiarcade.app')}`, '_blank');
                else if (platform === 'copy') navigator.clipboard.writeText(text).then(() => alert('已复制！'));
            }
        };
    </script>
</body>
</html>
