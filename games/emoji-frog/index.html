<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🐸 跳跳蛙原型 V0.1</title>

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3968599850270461" crossorigin="anonymous"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; }
        body {
            background: #0d1f15;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            overflow: auto;
        }

        /* 主容器 */
        #mainContainer {
            display: flex;
            width: 100%;
            max-width: 1200px;
            min-width: 640px;
            height: 100vh;
            min-height: 600px;
            background: #0d0d1a;
        }

        /* 广告位 */
        .ad-slot {
            width: 15%;
            min-width: 96px;
            background: linear-gradient(180deg, #1a3a2e 0%, #0d1f15 100%);
            border: 2px dashed #2d5a3d;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #4ade80;
            font-size: 14px;
            text-align: center;
            padding: 10px;
        }

        .ad-slot .ad-icon {
            font-size: 32px;
            margin-bottom: 10px;
            opacity: 0.5;
        }

        .ad-slot .ad-text {
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 4px;
        }

        /* 游戏主区域 */
        #gameArea {
            width: 70%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #0d1f15;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 100%;
            max-height: 800px;
        }
        #gameCanvas {
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #87CEEB 0%, #4ade80 50%, #0d1f15 100%);
            display: block;
        }
        .ui-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0,0,0,0.85);
            z-index: 100;
        }
        .hidden { display: none !important; }
        h1 {
            font-size: 42px;
            color: #4ade80;
            text-shadow: 0 0 20px #4ade80;
            margin-bottom: 10px;
        }
        .emoji-title {
            font-size: 80px;
            margin-bottom: 20px;
            animation: bounce 0.6s infinite alternate;
        }
        @keyframes bounce {
            from { transform: translateY(0) scale(1); }
            to { transform: translateY(-10px) scale(1.1); }
        }
        .btn {
            padding: 15px 40px;
            font-size: 22px;
            background: linear-gradient(135deg, #4ade80 0%, #16a34a 100%);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 20px rgba(74, 222, 128, 0.5);
        }
        .btn:hover { transform: scale(1.05); }
        .btn:active { transform: scale(0.95); }
        .instructions {
            color: #aaa;
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            line-height: 1.8;
        }
        .score-display {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 28px;
            font-weight: bold;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            z-index: 50;
        }
        .height-display {
            position: absolute;
            top: 55px;
            left: 50%;
            transform: translateX(-50%);
            color: #4ade80;
            font-size: 16px;
            z-index: 50;
        }
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.6);
            font-size: 12px;
            text-align: center;
            z-index: 50;
        }
    </style>
</head>
<body>
    <div id="mainContainer">
        <!-- 左侧广告栏 -->
        <div class="ad-slot" id="adLeft">
            <ins class="adsbygoogle"
                 style="display:block;width:100%;height:100%;"
                 data-ad-client="ca-pub-3968599850270461"
                 data-ad-slot="LEFT_AD_SLOT_ID"
                 data-ad-format="vertical"
                 data-full-width-responsive="false">
            </ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>

        <!-- 游戏主区域 -->
        <div id="gameArea">
            <div id="gameContainer">
                <canvas id="gameCanvas"></canvas>

                <div class="score-display hidden" id="scoreDisplay">0m</div>
                <div class="height-display hidden" id="heightDisplay"><span id="highScoreLabel">最高</span>: 0m</div>
                <div class="controls-hint hidden" id="controlsHint">A/D 或 ←→ 控制左右方向 | 左右穿墙</div>

                <div class="ui-overlay" id="startScreen">
                    <div class="emoji-title">🐸</div>
                    <h1>跳跳蛙</h1>
                    <button class="btn" id="startBtn">开始跳跃</button>
                    <div class="instructions">
                        青蛙自动跳跃，你只需要控制左右方向<br>
                        A/D 或 ←→ 移动，左右穿墙<br>
                        跳得越高，分数越高！
                    </div>
                </div>

                <div class="ui-overlay hidden" id="gameOverScreen">
                    <div class="emoji-title">💀</div>
                    <h1>游戏结束</h1>
                    <div class="instructions" style="font-size: 18px; margin-bottom: 20px;">
                        <span id="heightLabel">高度</span>: <span id="finalScore" style="color: #4ade80; font-weight: bold;">0</span>m
                    </div>
                    <button class="btn" id="restartBtn">再跳一次</button>
                    <button class="btn" id="backToArcadeBtn" style="margin-top: 15px; background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);">🏠 回到街机厅</button>
                </div>
            </div>
        </div>

        <!-- 右侧广告栏 -->
        <div class="ad-slot" id="adRight">
            <ins class="adsbygoogle"
                 style="display:block;width:100%;height:100%;"
                 data-ad-client="ca-pub-3968599850270461"
                 data-ad-slot="RIGHT_AD_SLOT_ID"
                 data-ad-format="vertical"
                 data-full-width-responsive="false">
            </ins>
            <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
        </div>
    </div>

    <script>
        // 语言检测
        const userLang = navigator.language || navigator.userLanguage;
        const isEnglish = userLang.startsWith('en');

        // 多语言文本
        const i18n = {
            zh: {
                title: '跳跳蛙',
                startBtn: '开始跳跃',
                instructions: '青蛙自动跳跃，你只需要控制左右方向<br>A/D 或 ←→ 移动，左右穿墙<br>跳得越高，分数越高！',
                score: '分数',
                highScore: '最高',
                controlsHint: 'A/D 或 ←→ 控制左右方向 | 左右穿墙',
                gameOver: '游戏结束',
                height: '高度',
                restartBtn: '再跳一次',
                backToArcade: '🏠 回到街机厅'
            },
            en: {
                title: 'Jumping Frog',
                startBtn: 'Start Jumping',
                instructions: 'The frog jumps automatically, you just control left/right<br>A/D or ←→ to move, wrap-around edges<br>Higher jump = higher score!',
                score: 'Score',
                highScore: 'Best',
                controlsHint: 'A/D or ←→ to move | Wrap-around edges',
                gameOver: 'Game Over',
                height: 'Height',
                restartBtn: 'Jump Again',
                backToArcade: '🏠 Back to Arcade'
            }
        };

        const t = isEnglish ? i18n.en : i18n.zh;

        // 应用翻译
        document.getElementById('startScreen').querySelector('h1').textContent = t.title;
        document.getElementById('startBtn').textContent = t.startBtn;
        document.getElementById('startScreen').querySelector('.instructions').innerHTML = t.instructions;
        document.getElementById('gameOverScreen').querySelector('h1').textContent = t.gameOver;
        document.getElementById('heightLabel').textContent = t.height;
        document.getElementById('highScoreLabel').textContent = t.highScore;
        document.getElementById('restartBtn').textContent = t.restartBtn;
        document.getElementById('backToArcadeBtn').textContent = t.backToArcade;
        document.getElementById('controlsHint').textContent = t.controlsHint;

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // 设置画布尺寸
        function resize() {
            const container = document.getElementById('gameContainer');
            canvas.width = container.clientWidth;
            canvas.height = container.clientHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        // 游戏状态
        let gameState = 'start'; // start, playing, gameover
        let score = 0;
        let maxHeight = localStorage.getItem('frogMaxHeight') || 0;

        // 相机
        let camera = { y: 0, targetY: 0 };

        // 物理参数（核心手感调这里）
        const GRAVITY = 0.4;        // 重力
        const JUMP_FORCE = -11;     // 跳跃力度（负值向上）
        const MOVE_SPEED = 5;       // 水平移动速度
        const FRICTION = 0.85;      // 摩擦力（空中惯性）

        // 玩家（青蛙）
        const player = {
            x: 0,
            y: 0,
            vx: 0,
            vy: 0,
            width: 40,
            height: 40,
            emoji: '🐸',
            grounded: false,
            facingRight: true
        };

        // 平台
        let platforms = [];
        const PLATFORM_WIDTH = 80;
        const PLATFORM_HEIGHT = 20;
        const PLATFORM_SPACING_MIN = 80;
        const PLATFORM_SPACING_MAX = 130;

        // 平台特性常量
        const PLATFORM_SINK_SPEED = 0.5;      // 荷叶下沉速度
        const PLATFORM_SINK_DELAY = 300;      // 荷叶开始下沉延迟(ms)
        const CLOUD_LIFETIME = 1000;          // 云朵存在时间(ms)
        const LILY_BOUNCE_BOOST = 1.3;        // 睡莲弹跳加成倍数
        const MUSHROOM_KNOCKBACK = 8;         // 蘑菇弹飞力度
        const LOG_DRIFT_SPEED = 1;            // 木桩漂移速度
        const LOG_DRIFT_RANGE = 80;           // 木桩漂移范围
        const ROCKET_BOOST = 3.0;             // 火箭平台弹跳倍数（超强力）

        // 输入状态
        const keys = { left: false, right: false, jump: false };
        let jumpPressed = false;

        // 初始化平台
        function initPlatforms() {
            platforms = [];
            // 起始平台在底部
            platforms.push({
                x: canvas.width / 2 - PLATFORM_WIDTH / 2,
                y: canvas.height - 100,
                width: PLATFORM_WIDTH,
                height: PLATFORM_HEIGHT,
                type: 'normal',
                emoji: '🍃'
            });

            // 生成初始平台
            let currentY = canvas.height - 100;
            while (currentY > -canvas.height) {
                currentY -= randomRange(PLATFORM_SPACING_MIN, PLATFORM_SPACING_MAX);
                platforms.push(generatePlatform(currentY));
            }
        }

        function generatePlatform(y) {
            const margin = 60;
            const types = [
                { type: 'normal', emoji: '🍃', chance: 0.50 },
                { type: 'lily', emoji: '🪷', chance: 0.12 },
                { type: 'cloud', emoji: '☁️', chance: 0.12 },
                { type: 'mushroom', emoji: '🍄', chance: 0.10 },
                { type: 'log', emoji: '🪵', chance: 0.10 },
                { type: 'rocket', emoji: '🚀', chance: 0.06 }
            ];

            const rand = Math.random();
            let selected = types[0];
            let cumChance = 0;
            for (const t of types) {
                cumChance += t.chance;
                if (rand <= cumChance) {
                    selected = t;
                    break;
                }
            }

            const platform = {
                x: randomRange(margin, canvas.width - PLATFORM_WIDTH - margin),
                y: y,
                width: PLATFORM_WIDTH,
                height: PLATFORM_HEIGHT,
                type: selected.type,
                emoji: selected.emoji,
                // 平台状态
                touched: false,           // 是否被踩过
                touchedTime: 0,           // 被踩时间
                originalY: y,             // 原始Y坐标
                originalX: 0,             // 原始X坐标（木桩用）
                opacity: 1,               // 云朵透明度
                broken: false,            // 是否已破碎/消失
                driftDirection: 1,        // 木桩漂移方向
                driftOffset: 0            // 木桩当前漂移偏移
            };

            // 木桩记录原始X位置
            if (platform.type === 'log') {
                platform.originalX = platform.x;
            }

            return platform;
        }

        function randomRange(min, max) {
            return Math.random() * (max - min) + min;
        }

        // 初始化玩家
        function initPlayer() {
            player.x = canvas.width / 2 - player.width / 2;
            player.y = canvas.height - 150;
            player.vx = 0;
            player.vy = 0;
            player.grounded = false;
            player.hasLilyBounce = false;
            player.hasMushroomBounce = false;
            player.hasRocketBounce = false;
        }

        // 开始游戏
        function startGame() {
            gameState = 'playing';
            score = 0;
            lastScoreUpdate = 0;
            camera.y = 0;
            camera.targetY = 0;
            initPlatforms();
            initPlayer();

            document.getElementById('startScreen').classList.add('hidden');
            document.getElementById('gameOverScreen').classList.add('hidden');
            document.getElementById('scoreDisplay').classList.remove('hidden');
            document.getElementById('heightDisplay').classList.remove('hidden');
            document.getElementById('controlsHint').classList.remove('hidden');
            document.getElementById('heightDisplay').textContent = `${t.highScore}: ${Math.floor(maxHeight)}m`;

            gameLoop();
        }

        // 游戏结束
        function gameOver() {
            gameState = 'gameover';

            if (score > maxHeight) {
                maxHeight = score;
                localStorage.setItem('frogMaxHeight', maxHeight);
            }

            document.getElementById('finalScore').textContent = Math.floor(score);
            document.getElementById('gameOverScreen').classList.remove('hidden');
            document.getElementById('scoreDisplay').classList.add('hidden');
            document.getElementById('heightDisplay').classList.add('hidden');
            document.getElementById('controlsHint').classList.add('hidden');
        }

        // 更新物理
        function updatePhysics() {
            // 水平移动
            if (keys.left) {
                player.vx -= 1;
                player.facingRight = false;
            }
            if (keys.right) {
                player.vx += 1;
                player.facingRight = true;
            }

            // 摩擦力
            player.vx *= FRICTION;

            // 限制最大速度
            player.vx = Math.max(-MOVE_SPEED, Math.min(MOVE_SPEED, player.vx));

            // 应用重力
            player.vy += GRAVITY;

            // 更新位置
            player.x += player.vx;
            player.y += player.vy;

            // 屏幕边界循环（左右穿墙）
            if (player.x + player.width < 0) {
                player.x = canvas.width;
            } else if (player.x > canvas.width) {
                player.x = -player.width;
            }

            // 跳跃（自动模式：落地后立即起跳，除非刚触发特殊弹跳）
            if (player.grounded && !player.hasLilyBounce && !player.hasMushroomBounce && !player.hasRocketBounce) {
                player.vy = JUMP_FORCE;
                player.grounded = false;
            }
            player.hasLilyBounce = false; // 重置标记
            player.hasMushroomBounce = false; // 重置标记
            player.hasRocketBounce = false; // 重置标记
        }

        // 碰撞检测
        function checkCollisions() {
            player.grounded = false;

            // 只检测下降时的碰撞
            if (player.vy > 0) {
                for (const plat of platforms) {
                    // 跳过已消失的云朵
                    if (plat.broken) continue;

                    // 检测是否落在平台上
                    if (player.x + player.width * 0.3 < plat.x + plat.width &&
                        player.x + player.width * 0.7 > plat.x &&
                        player.y + player.height >= plat.y &&
                        player.y + player.height <= plat.y + plat.height + player.vy + 2) {

                        player.y = plat.y - player.height;
                        player.grounded = true;

                        // 触发平台特性
                        handlePlatformTouch(plat);
                        break;
                    }
                }
            }
        }

        // 处理平台被踩踏
        function handlePlatformTouch(plat) {
            const now = Date.now();
            
            switch (plat.type) {
                case 'normal': // 🍃 荷叶 - 踩后开始下沉
                    if (!plat.touched) {
                        plat.touched = true;
                        plat.touchedTime = now;
                    }
                    break;
                    
                case 'lily': // 🪷 睡莲 - 弹跳加成
                    player.vy = JUMP_FORCE * LILY_BOUNCE_BOOST;
                    player.grounded = false;
                    player.hasLilyBounce = true;
                    createBounceEffect(plat.x + plat.width/2, plat.y);
                    break;
                    
                case 'cloud': // ☁️ 云朵 - 3秒后消失
                    if (!plat.touched) {
                        plat.touched = true;
                        plat.touchedTime = now;
                    }
                    break;
                    
                case 'mushroom': // 🍄 蘑菇 - 弹飞陷阱
                    // 随机弹飞方向（但总体向上）
                    const angle = (Math.random() - 0.5) * Math.PI; // -90° 到 90°
                    player.vx = Math.sin(angle) * MUSHROOM_KNOCKBACK;
                    player.vy = -Math.abs(Math.cos(angle) * MUSHROOM_KNOCKBACK) - 5;
                    player.grounded = false;
                    player.hasMushroomBounce = true;
                    // 视觉反馈：红色粒子
                    createMushroomEffect(plat.x + plat.width/2, plat.y);
                    break;
                    
                case 'log': // 🪵 木桩 - 普通平台，但会漂移
                    if (!plat.touched) {
                        plat.touched = true;
                    }
                    // 木桩不触发自动跳跃，让玩家自己控制
                    player.vy = 0;
                    player.grounded = true;
                    break;
                    
                case 'rocket': // 🚀 火箭平台 - 超强弹跳
                    player.vy = JUMP_FORCE * ROCKET_BOOST;
                    player.grounded = false;
                    player.hasRocketBounce = true;
                    // 火焰粒子效果
                    createRocketEffect(plat.x + plat.width/2, plat.y);
                    break;
            }
        }

        // 弹跳粒子效果
        let particles = [];
        function createBounceEffect(x, y) {
            for (let i = 0; i < 5; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 4,
                    vy: Math.random() * -3 - 1,
                    life: 30,
                    maxLife: 30,
                    color: '#4ade80',
                    size: 3
                });
            }
        }

        // 火箭火焰粒子效果
        function createRocketEffect(x, y) {
            for (let i = 0; i < 8; i++) {  // 从15减少到8
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 6,
                    vy: Math.random() * 5 + 2, // 向下喷射
                    life: 35,
                    maxLife: 35,
                    color: Math.random() > 0.5 ? '#ff6600' : '#ffcc00', // 橙色和黄色火焰
                    size: 5  // 从6减少到5
                });
            }
        }

        // 蘑菇弹飞粒子效果
        function createMushroomEffect(x, y) {
            for (let i = 0; i < 8; i++) {
                particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 10,
                    vy: Math.random() * -8 - 2,
                    life: 40,
                    maxLife: 40,
                    color: '#ff4444',
                    size: 5
                });
            }
        }

        // 更新相机
        function updateCamera() {
            // 目标：玩家位于屏幕中间偏下
            const targetY = player.y - canvas.height * 0.5;

            // 计算相机需要移动的距离
            const deltaY = (targetY - camera.y) * 0.15;

            // 向下掉时限制跟随：最多跟随10px
            if (deltaY > 0) {
                // 玩家在下落，相机最多跟随10px
                camera.y += Math.min(deltaY, 10);
            } else {
                // 玩家在上跳，相机正常跟随
                camera.y += deltaY;
            }
        }

        // 更新平台状态
        function updatePlatforms() {
            const now = Date.now();

            for (const plat of platforms) {
                if (plat.type === 'normal' && plat.touched) {
                    // 🍃 荷叶：延迟后开始下沉
                    if (now - plat.touchedTime > PLATFORM_SINK_DELAY) {
                        plat.y += PLATFORM_SINK_SPEED;
                    }
                }

                if (plat.type === 'cloud' && plat.touched) {
                    // ☁️ 云朵：3秒后消失
                    const elapsed = now - plat.touchedTime;
                    if (elapsed >= CLOUD_LIFETIME) {
                        plat.broken = true;
                    } else {
                        // 逐渐透明
                        plat.opacity = 1 - (elapsed / CLOUD_LIFETIME) * 0.7;
                    }
                }

                if (plat.type === 'log') {
                    // 🪵 木桩：左右漂移
                    plat.driftOffset += LOG_DRIFT_SPEED * plat.driftDirection;
                    plat.x = plat.originalX + plat.driftOffset;

                    // 到达边界时反向
                    if (Math.abs(plat.driftOffset) >= LOG_DRIFT_RANGE) {
                        plat.driftDirection *= -1;
                    }
                }
            }
        }

        // 更新粒子效果
        function updateParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2; // 重力
                p.life--;

                if (p.life <= 0) {
                    particles.splice(i, 1);
                }
            }
        }

        // 生成新平台
        function generateNewPlatforms() {
            let topPlatform = platforms[platforms.length - 1];
            // 在相机上方生成新平台（提前生成，避免玩家看到空白）
            const spawnThreshold = camera.y - canvas.height * 0.5;

            // 在相机上方生成新平台
            while (topPlatform.y > spawnThreshold) {
                const newY = topPlatform.y - randomRange(PLATFORM_SPACING_MIN, PLATFORM_SPACING_MAX);
                platforms.push(generatePlatform(newY));
                topPlatform = platforms[platforms.length - 1];
            }
            
            // 清理屏幕下方的旧平台（相机下方超过2屏的平台）
            const cleanupThreshold = camera.y + canvas.height * 2;
            platforms = platforms.filter(p => p.y < cleanupThreshold && !p.broken);
        }

        // 检查死亡
        function checkDeath() {
            // 掉到当前屏幕底部下方即游戏结束（无容错）
            if (player.y > camera.y + canvas.height) {
                gameOver();
            }
        }

        // 更新分数
        let lastScoreUpdate = 0;
        function updateScore() {
            const height = Math.max(0, Math.floor((canvas.height - 100 - player.y) / 10));
            if (height > score) {
                score = height;
                // 每10分或每秒更新一次DOM，减少重绘
                const now = Date.now();
                if (now - lastScoreUpdate > 200) {
                    document.getElementById('scoreDisplay').textContent = score + 'm';
                    lastScoreUpdate = now;
                }
            }
        }

        // 绘制
        function draw() {
            // 清空画布
            ctx.fillStyle = '#0d1f15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制简化背景（静态颜色，不每帧创建渐变）
            const skyOffset = Math.floor(Math.max(0, Math.min(1, -camera.y / 5000)) * 10) / 10; // 量化减少变化
            const topHue = 200 + Math.floor(skyOffset * 60);
            const midHue = 150 + Math.floor(skyOffset * 40);
            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, `hsl(${topHue}, 70%, ${20 + skyOffset * 30}%)`);
            gradient.addColorStop(0.5, `hsl(${midHue}, 60%, ${30 + skyOffset * 20}%)`);
            gradient.addColorStop(1, '#0d1f15');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            ctx.save();
            ctx.translate(0, -camera.y);

            // 绘制平台 - 只绘制可见范围内的
            const visibleTop = camera.y - 100;
            const visibleBottom = camera.y + canvas.height + 100;
            
            for (const plat of platforms) {
                // 跳过已破碎的和不可见的平台
                if (plat.broken) continue;
                if (plat.y < visibleTop || plat.y > visibleBottom) continue;

                ctx.save();
                ctx.globalAlpha = plat.opacity || 1;

                // 平台背景
                let bgColor = 'rgba(0, 50, 30, 0.3)';
                if (plat.type === 'cloud') bgColor = 'rgba(200, 220, 255, 0.3)';
                if (plat.type === 'mushroom') bgColor = 'rgba(255, 100, 100, 0.3)';
                if (plat.type === 'log') bgColor = 'rgba(139, 90, 43, 0.4)';
                if (plat.type === 'rocket') bgColor = 'rgba(255, 100, 0, 0.4)';
                ctx.fillStyle = bgColor;
                ctx.beginPath();
                ctx.roundRect(plat.x, plat.y, plat.width, plat.height, 10);
                ctx.fill();

                // 木桩添加木纹效果
                if (plat.type === 'log') {
                    ctx.strokeStyle = 'rgba(100, 60, 30, 0.5)';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.moveTo(plat.x + 20, plat.y + 5);
                    ctx.lineTo(plat.x + 20, plat.y + plat.height - 5);
                    ctx.moveTo(plat.x + plat.width - 20, plat.y + 5);
                    ctx.lineTo(plat.x + plat.width - 20, plat.y + plat.height - 5);
                    ctx.stroke();
                }

                // 平台表情
                ctx.font = '30px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(plat.emoji, plat.x + plat.width / 2, plat.y + 5);

                // 荷叶下沉提示：微微变色
                if (plat.type === 'normal' && plat.touched) {
                    ctx.fillStyle = 'rgba(255, 200, 100, 0.3)';
                    ctx.fill();
                }

                // 蘑菇危险提示：红色闪烁
                if (plat.type === 'mushroom') {
                    const pulse = Math.sin(Date.now() / 200) * 0.3 + 0.7;
                    ctx.fillStyle = `rgba(255, 0, 0, ${0.2 * pulse})`;
                    ctx.fill();
                }

                // 火箭平台：橙色发光脉冲
                if (plat.type === 'rocket') {
                    const pulse = Math.sin(Date.now() / 150) * 0.4 + 0.6;
                    ctx.shadowColor = '#ff6600';
                    ctx.shadowBlur = 15 * pulse;
                    ctx.fillStyle = `rgba(255, 100, 0, ${0.3 * pulse})`;
                    ctx.fill();
                    ctx.shadowBlur = 0;
                }

                ctx.restore();
            }

            // 绘制粒子
            for (const p of particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.life / (p.maxLife || 30);
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size || 3, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.globalAlpha = 1;

            // 绘制玩家（青蛙）
            ctx.font = '40px Arial';
            ctx.textAlign = 'center';
            ctx.fillStyle = '#000';  // 重置填充颜色，避免被粒子颜色污染
            ctx.save();
            ctx.translate(player.x + player.width / 2, player.y + player.height / 2);
            if (!player.facingRight) {
                ctx.scale(-1, 1);
            }
            // 跳跃时旋转
            const rotation = Math.min(Math.PI / 4, Math.max(-Math.PI / 4, player.vy * 0.05));
            ctx.rotate(rotation);
            ctx.fillText(player.emoji, 0, 10);
            ctx.restore();

            ctx.restore();
        }

        // 游戏循环
        function gameLoop() {
            if (gameState !== 'playing') return;

            updatePhysics();
            checkCollisions();
            updatePlatforms();
            updateParticles();
            updateCamera();
            generateNewPlatforms();
            updateScore();
            checkDeath();

            draw();
            requestAnimationFrame(gameLoop);
        }

        // 事件监听
        document.getElementById('startBtn').addEventListener('click', startGame);
        document.getElementById('restartBtn').addEventListener('click', startGame);
        document.getElementById('backToArcadeBtn').addEventListener('click', () => {
            window.location.href = '/';
        });

        // 键盘控制
        window.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                jumpPressed = true;
            }
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                jumpPressed = false;
            }
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys.left = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys.right = false;
        });

        // 触摸/点击控制
        let touchStartX = 0;

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            touchStartX = e.touches[0].clientX;
            jumpPressed = true;
        }, { passive: false });

        canvas.addEventListener('touchmove', (e) => {
            e.preventDefault();
            const touchX = e.touches[0].clientX;
            const diff = touchX - touchStartX;

            if (diff < -30) {
                keys.left = true;
                keys.right = false;
            } else if (diff > 30) {
                keys.right = true;
                keys.left = false;
            } else {
                keys.left = false;
                keys.right = false;
            }
        }, { passive: false });

        canvas.addEventListener('touchend', () => {
            jumpPressed = false;
            keys.left = false;
            keys.right = false;
        });

        // 鼠标点击也触发跳跃
        canvas.addEventListener('mousedown', () => {
            jumpPressed = true;
        });

        canvas.addEventListener('mouseup', () => {
            jumpPressed = false;
        });

        // 初始化显示最高分
        const historyHighText = isEnglish ? 'Personal Best' : '历史最高';
        document.querySelector('#startScreen .instructions').innerHTML += `<br><br>${historyHighText}: ${Math.floor(maxHeight)}m`;
    </script>
</body>
</html>
